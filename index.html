<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Rich記帳</title>
<meta name="theme-color" content="#B85550">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rich記帳">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4EBE8;--surf:#EBE0DC;--card:#FAF5F2;
  --maple:#B85550;--maple-d:#8A3530;--maple-l:#CC7A74;--maple-ll:#F0D8D5;--maple-lll:#FAF1EF;
  --green:#6B8F72;--green-l:#9ABB9F;--green-ll:#E4F0E6;
  --navy:#566D82;--navy-l:#8AAABB;--navy-ll:#DCE8F2;
  --bean:#8CA08A;--bean-l:#BAC8B8;--bean-ll:#E6EEE5;
  --plum:#7A6C9A;--plum-l:#B0A8CC;--plum-ll:#ECEAF6;
  --yellow:#C9A85C;--yellow-l:#EAD9A8;--yellow-ll:#FDF6E4;
  --text:#3A2E2C;--textm:#62504C;--textl:#9A9298;
  --bdr:rgba(140,115,110,0.2);--r:13px;
  --acc:var(--green);
}
body{background:var(--bg);color:var(--textm);font-family:-apple-system,'PingFang TC',sans-serif;overscroll-behavior:none}
.pnum{font-family:Impact,'Arial Black',sans-serif!important}
.tab{flex:1;padding:9px 0;background:none;border:none;border-bottom:2.5px solid transparent;font-size:11px;color:var(--textl);cursor:pointer;font-family:inherit;transition:.2s}
.tab.on{font-weight:700}
.tab[data-c=y].on{color:var(--green);border-bottom-color:var(--green)}
.tab[data-c=b].on{color:var(--navy);border-bottom-color:var(--navy)}
.tab[data-c=a].on{color:var(--maple);border-bottom-color:var(--maple)}
.tab[data-c=p].on{color:var(--bean);border-bottom-color:var(--bean)}
.tab[data-c=r].on{color:var(--plum);border-bottom-color:var(--plum)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px}
.sl{font-size:11px;color:var(--textl);margin-bottom:3px}
.sv{font-size:19px;font-weight:500}
.sec{font-size:11px;color:var(--textl);letter-spacing:.5px;margin:13px 0 7px;font-weight:700}
.ei{display:flex;flex-direction:column;background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.eirow{display:flex;align-items:center;gap:9px}
.eico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.en{flex:1;min-width:0}
.ename{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.emeta{font-size:11px;color:var(--textl);margin-top:2px;display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.db{background:none;border:none;color:var(--textl);cursor:pointer;font-size:13px;padding:4px 6px;opacity:.5;line-height:1}
.db:hover{opacity:1;color:var(--maple)}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:12px;font-weight:500}
.fg{margin-bottom:12px}
.fl{font-size:12px;color:var(--textl);display:block;margin-bottom:5px;font-weight:500}
.fi{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--acc)}
.mtitle{font-size:16px;font-weight:700;color:var(--text);text-align:center;margin-bottom:16px}
.mbtns{display:flex;gap:7px}
.mb{flex:1;padding:9px 4px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--textm);font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;text-align:center}
.mb.on{color:#fff;border-color:transparent}
.sub{width:100%;padding:13px;color:#fff;border:none;border-radius:var(--r);font-size:15px;cursor:pointer;font-family:inherit;font-weight:700;margin-top:10px}
.catbtn{padding:6px 11px;border-radius:20px;font-size:12px;background:var(--surf);border:1px solid var(--bdr);cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap}
.ab{width:100%;padding:10px;background:none;border:1px dashed var(--bdr);border-radius:var(--r);color:var(--textl);font-size:13px;cursor:pointer;font-family:inherit;margin-top:6px;transition:.15s}
.ab:hover{border-color:var(--acc);color:var(--acc)}
.empty{text-align:center;padding:28px 0;color:var(--textl);font-size:13px;line-height:1.9}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.date-btn{background:var(--surf);border:none;font-size:12px;color:var(--textm);cursor:pointer;padding:6px 14px;border-radius:20px;font-family:inherit}
.date-label{font-size:14px;font-weight:700;color:var(--text)}
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.togbtn{border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid;transition:.15s}
.inst-info{font-size:12px;color:var(--textl);text-align:center;padding:8px 12px;border-radius:var(--r);margin-top:8px}
.acard{border-radius:14px;padding:14px 16px;margin-bottom:8px;background:var(--card);border:.5px solid var(--bdr);display:flex;align-items:center;gap:12px}
.rec-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:.5px solid var(--bdr);cursor:pointer}
.srow:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="W" style="height:100dvh;overflow:hidden;position:relative;max-width:430px;margin:0 auto;background:var(--bg)">
  <div id="scroll" style="height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:86px">
    <div style="display:flex;flex-direction:column;align-items:center;padding:16px 16px 4px;position:relative">
      <button onclick="showM('settings')" style="position:absolute;top:14px;right:14px;background:var(--maple-ll);border:none;width:32px;height:32px;border-radius:50%;color:var(--maple-d);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">&#9881;</button>
      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="position:relative;width:156px;height:156px">
          <svg style="position:absolute;inset:0" viewBox="0 0 162 162">
            <circle cx="81" cy="81" r="78" fill="white" stroke="var(--maple-ll)" stroke-width="1.5"/>
            <circle cx="81" cy="81" r="69" fill="none" stroke="#EDD0CC" stroke-width="9"/>
            <circle id="prog-ring" cx="81" cy="81" r="69" fill="none" stroke="var(--maple)" stroke-width="9" stroke-dasharray="433" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 81 81)" style="transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
            <div style="font-size:9px;color:var(--maple);font-weight:700;letter-spacing:2px">今日剩餘</div>
            <div id="hamt" class="pnum" style="font-size:34px;color:var(--maple-d);letter-spacing:-1.5px;line-height:1.1">$0</div>
            <div id="hspent" style="font-size:9px;color:var(--maple-l);font-weight:500">已支出 $0</div>
          </div>
        </div>
        <div style="width:10px;background:linear-gradient(var(--maple),var(--maple-l));height:16px;border-radius:0 0 5px 5px;margin-top:-1px;z-index:1;position:relative"></div>
        <div style="width:76px;height:76px;border-radius:50%;background:linear-gradient(150deg,var(--plum-l),var(--plum));display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-1px;box-shadow:0 5px 15px rgba(122,108,154,.3)">
          <div id="fund-name-lbl" style="font-size:9px;color:rgba(255,255,255,.85);font-weight:700;letter-spacing:1px">私房錢</div>
          <div id="fund-disp" class="pnum" style="font-size:17px;color:#fff;letter-spacing:-.5px">$0</div>
        </div>
      </div>
    </div>
    <div style="display:flex;padding:8px 16px 0;gap:2px">
      <button class="tab on" data-c="y" onclick="setTab('today',this,'y')">今日記帳</button>
      <button class="tab" data-c="b" onclick="setTab('cards',this,'b')">信用卡</button>
      <button class="tab" data-c="a" onclick="setTab('accounts',this,'a')">帳戶</button>
      <button class="tab" data-c="p" id="tab-petty" onclick="setTab('petty',this,'p')" onmousedown="tabLp('petty')" onmouseup="tabLpEnd()" onmouseleave="tabLpEnd()" ontouchstart="tabLp('petty');event.stopPropagation()" ontouchend="tabLpEnd()" ontouchmove="tabLpEnd()" style="user-select:none;-webkit-user-select:none">零用金</button>
      <button class="tab" data-c="r" id="tab-fund" onclick="setTab('fund',this,'r')" onmousedown="tabLp('fund')" onmouseup="tabLpEnd()" onmouseleave="tabLpEnd()" ontouchstart="tabLp('fund');event.stopPropagation()" ontouchend="tabLpEnd()" ontouchmove="tabLpEnd()" style="user-select:none;-webkit-user-select:none">私房錢</button>
    </div>
    <div id="body" style="padding:12px 16px 0"></div>
  </div>
  <button id="fab" onclick="showM('add')" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;width:56px;height:56px;border-radius:50%;border:none;font-size:28px;box-shadow:0 4px 16px rgba(107,143,114,.45);z-index:10;cursor:pointer">+</button>
  <div id="mo" onclick="closeOnBg(event)" style="display:none;position:absolute;inset:0;background:rgba(30,22,20,.35);z-index:50;align-items:flex-end">
    <div id="mpanel" style="background:var(--card);border-radius:22px 22px 0 0;padding:12px 18px 36px;width:100%;max-height:93%;overflow-y:auto;position:relative">
      <div style="width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 14px"></div>
      <button onclick="closeM()" style="position:absolute;top:12px;right:16px;background:var(--surf);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--textm);cursor:pointer;z-index:10">✕</button>
      <div id="mc"></div>
    </div>
  </div>
</div>
<script>
// ─── CONSTANTS ──────────────────────────────────────────────────────
const CAT_DEF=['飲食','投資','保險','追星','寵物','交通','機車','交際','公司','自訂一','自訂二','自訂三'];
const CAT_ICONS={飲食:'🍜',投資:'📈',保險:'🛡',追星:'⭐',寵物:'🐾',交通:'🚌',機車:'🏍',交際:'🍻',公司:'🏢',薪資:'💼',外快:'💡',獎金:'🎁',紅包:'🧧',利息股利:'💰',報帳回饋:'🏷',網拍二手:'📦',自訂一:'✨',自訂二:'✨',自訂三:'✨',收自訂一:'✨',收自訂二:'✨',收自訂三:'✨'};
const CAT_COL={飲食:'#C9A85C',投資:'#6B8F72',保險:'#566D82',追星:'#C47A7A',寵物:'#D4A870',交通:'#789098',機車:'#A89070',交際:'#9B8EB8',公司:'#7A8E8A',薪資:'#6B8F72',外快:'#C9A85C',獎金:'#CC8874',紅包:'#B85550',利息股利:'#8CA08A',報帳回饋:'#8898A8',網拍二手:'#A0907A',自訂一:'#9A9298',自訂二:'#9A9298',自訂三:'#9A9298',收自訂一:'#6B8F72',收自訂二:'#6B8F72',收自訂三:'#6B8F72'};
const XCOL=['#B85550','#8CA08A','#7A6C9A','#C4A890','#7AA4B2','#CC8874','#B0A050','#889880'];
const CC_BG=['linear-gradient(140deg,#566D82,#3A4E64)','linear-gradient(140deg,#6B8F72,#4A7055)','linear-gradient(140deg,#7A6C9A,#5A4C7A)','linear-gradient(140deg,#B85550,#8A3530)','linear-gradient(140deg,#8CA08A,#6A8068)'];
const ACC_ICONS={現金:'💵',銀行:'🏦',電子錢包:'📱',悠遊卡:'🎫',其他:'💰'};
const ACC_COLS={現金:'#C9A85C',銀行:'566D82',電子錢包:'#6B8F72',悠遊卡:'#789098',其他:'#9A9298'};
const FABCOL={y:'#6B8F72',b:'#566D82',a:'#B85550',p:'#8CA08A',r:'#7A6C9A'};

// ─── STATE ──────────────────────────────────────────────────────────
let S={
  budget:1000, expenses:[], incomes:[], transfers:[],
  cards:[], recurring:[],
  accounts:[{id:'acc-cash',name:'現金',type:'現金',initBal:0}],
  petty:{budget:5000}, fund:{balance:0},
  tabNames:{petty:'零用金',fund:'私房錢'},
  categories:[...CAT_DEF], customCats:[],
  incomeCategories:['薪資','外快','獎金','紅包','利息股利','報帳回饋','網拍二手','收自訂一','收自訂二','收自訂三']
};
let viewDate=new Date(), tab='today', curC='y', chartPer='month';
let AF={type:'exp',cat:'飲食',incCat:'薪資',date:'',method:'現金',cardId:null,accId:null,inst:false,periods:3,_a:'',_d:'',editingId:null};
let lpTimer=null, calView={y:0,m:0};

// ─── UTILS ──────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt=n=>'$'+Math.round(Math.abs(n)).toLocaleString('zh-TW');
const fmtD=ts=>new Date(ts).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
const fmtT=ts=>new Date(ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
const todayStr=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const dateToTs=str=>{const[y,m,d]=str.split('-').map(Number);const n=new Date();return new Date(y,m-1,d,n.getHours(),n.getMinutes()).getTime()};
const fmtDateYMD=ts=>{const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const sameDay=(ts,ref)=>new Date(ts).toDateString()===ref.toDateString();
const personal=e=>!e.isFund&&e.method!=='零用金';
const getBilled=e=>{if(!e.inst||!e.inst.on)return 0;let sd=31;if(e.cardId){const c=S.cards.find(x=>x.id===e.cardId);if(c&&parseInt(c.statementDate))sd=parseInt(c.statementDate);}const tx=new Date(e.date);let fY=tx.getFullYear(),fM=tx.getMonth();if(tx.getDate()>sd)fM+=1;const n=new Date();let b=(n.getFullYear()-fY)*12+(n.getMonth()-fM);if(n.getDate()>=sd)b+=1;return b;};
const allCats=()=>[...S.categories,...S.customCats.map(c=>c.name)];
const catIcon=c=>CAT_ICONS[c]||'📌';
const catCol=c=>{if(CAT_COL[c])return CAT_COL[c];const x=S.customCats.find(x=>x.name===c);return x?x.color:'#9A9298'};
const fmtDateDisp=str=>{if(!str||str===todayStr())return'今天';const[y,m,d]=str.split('-');return str.slice(0,4)===todayStr().slice(0,4)?parseInt(m)+'月'+parseInt(d)+'日':y+'/'+parseInt(m)+'/'+parseInt(d)};
const accBal=aid=>{
  const a=S.accounts.find(x=>x.id===aid);if(!a)return 0;
  let b=a.initBal||0;
  S.incomes.filter(i=>i.accId===aid&&!i.isFund).forEach(i=>b+=i.amount);
  S.expenses.filter(e=>e.accId===aid&&!e.isFund).forEach(e=>b-=e.amount);
  S.transfers.filter(t=>t.toId===aid).forEach(t=>b+=t.amount);
  S.transfers.filter(t=>t.fromId===aid).forEach(t=>b-=t.amount);
  return b;
};
const totalAssets=()=>S.accounts.reduce((s,a)=>s+accBal(a.id),0);
const accIcon=a=>ACC_ICONS[a.type]||'💰';
const accCol=a=>ACC_COLS[a.type]||'#9A9298';

// ─── STORAGE ────────────────────────────────────────────────────────
function load(){
  try{const d=localStorage.getItem('Berich_V10');if(d)Object.assign(S,JSON.parse(d));
    if(!S.categories)S.categories=[...CAT_DEF];
    if(!S.customCats)S.customCats=[];
    if(!S.incomeCategories)S.incomeCategories=['薪資','外快','獎金','紅包','利息股利','報帳回饋','網拍二手','收自訂一','收自訂二','收自訂三'];
    if(!S.petty)S.petty={budget:5000};if(!S.fund)S.fund={balance:0};
    if(!S.incomes)S.incomes=[];if(!S.cards)S.cards=[];
    if(!S.accounts||!S.accounts.length)S.accounts=[{id:'acc-cash',name:'現金',type:'現金',initBal:0}];
    if(!S.recurring)S.recurring=[];if(!S.transfers)S.transfers=[];
    if(!S.tabNames)S.tabNames={petty:'零用金',fund:'私房錢'};
    if(!S.tabNames.petty)S.tabNames.petty='零用金';
    if(!S.tabNames.fund)S.tabNames.fund='私房錢';
    if(!S.categories.includes('自訂一') && !S.categories.some(c=>c.includes('自訂'))) S.categories.push('自訂一','自訂二','自訂三');
    if(!S.incomeCategories.includes('收自訂一') && !S.incomeCategories.some(c=>c.includes('收自訂'))) S.incomeCategories.push('收自訂一','收自訂二','收自訂三');
  }catch(e){}
  checkRecurring();render();
}
const save=()=>{try{localStorage.setItem('Berich_V10',JSON.stringify(S));}catch(e){}};

function clearAllData(){
  if(confirm('確定要清空所有測試資料嗎？\n此動作無法復原喔！')){
    localStorage.removeItem('Berich_V10');
    location.reload();
  }
}

// ─── RECURRING CHECK ────────────────────────────────────────────────
function checkRecurring(){
  const dd=new Date().getDate(),ds=todayStr();
  const due=S.recurring.filter(r=>r.active&&r.day===dd&&r.lastAdded!==ds);
  if(!due.length)return;
  setTimeout(()=>{
    document.getElementById('mc').innerHTML=
      '<div class="mtitle">📅 今日固定項目</div>'+
      '<div style="font-size:12px;color:var(--textl);text-align:center;margin-bottom:14px">以下項目今天到期，要一鍵記帳嗎？</div>'+
      due.map(r=>'<div class="rec-card">'+
        '<div style="width:36px;height:36px;background:'+(r.type==='inc'?'var(--green-ll)':'var(--maple-ll)')+';border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">'+catIcon(r.cat)+'</div>'+
        '<div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">'+r.name+'</div><div style="font-size:11px;color:var(--textl)">'+r.cat+' · 每月'+r.day+'日</div></div>'+
        '<div style="font-size:15px;font-weight:700;color:'+(r.type==='inc'?'var(--green)':'var(--maple)')+';">'+(r.type==='inc'?'+':'-')+fmt(r.amount)+'</div>'+
        '<button onclick="addRecNow(\''+r.id+'\')" style="background:var(--maple);color:#fff;border:none;border-radius:9px;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;margin-left:8px">記帳</button>'+
      '</div>').join('')+
      '<button onclick="closeM()" style="width:100%;padding:10px;background:var(--surf);border:none;border-radius:var(--r);font-size:13px;cursor:pointer;font-family:inherit;color:var(--textm);margin-top:4px">稍後再說</button>';
    document.getElementById('mo').style.display='flex';
  },700);
}
function addRecNow(id){
  const r=S.recurring.find(x=>x.id===id);if(!r)return;
  const ts=Date.now(),ds=todayStr();
  if(r.type==='inc')S.incomes.push({id:uid(),date:ts,amount:r.amount,desc:r.name,cat:r.cat,method:'現金',accId:null,isFund:false});
  else S.expenses.push({id:uid(),date:ts,amount:r.amount,desc:r.name,cat:r.cat,method:r.method||'現金',accId:null,isFund:false});
  r.lastAdded=ds;save();closeM();render();
}

// ─── RENDER CORE ────────────────────────────────────────────────────
function setAccent(c){
  curC=c;const fab=document.getElementById('fab');
  if(fab){fab.style.background=FABCOL[c];fab.style.boxShadow='0 4px 16px '+FABCOL[c]+'66';}
  const m={y:['--green','--green-l','--green-ll'],b:['--navy','--navy-l','--navy-ll'],a:['--maple','--maple-l','--maple-ll'],p:['--bean','--bean-l','--bean-ll'],r:['--plum','--plum-l','--plum-ll']};
  const rt=document.documentElement;
  if(m[c]){rt.style.setProperty('--acc','var('+m[c][0]+')');rt.style.setProperty('--acc-l','var('+m[c][1]+')');rt.style.setProperty('--acc-ll','var('+m[c][2]+')');}
}
function render(){
  const tExp=S.expenses.filter(e=>personal(e)&&sameDay(e.date,viewDate)).reduce((s,e)=>s+e.amount,0);
  const rem=S.budget-tExp,pct=Math.max(0,Math.min(100,rem/S.budget*100));
  document.getElementById('hamt').textContent=fmt(Math.max(0,rem));
  document.getElementById('hspent').textContent='已支出 '+fmt(tExp);
  document.getElementById('fund-disp').textContent=fmt(S.fund.balance);
  const ring=document.getElementById('prog-ring');if(ring)ring.setAttribute('stroke-dashoffset',Math.round(433*(1-pct/100)));
  setAccent(curC);renderBody();updateTabLabels();
}
function renderBody(){
  const el=document.getElementById('body');
  if(tab==='today')el.innerHTML=rToday();
  else if(tab==='cards')el.innerHTML=rCards();
  else if(tab==='accounts')el.innerHTML=rAccounts();
  else if(tab==='petty')el.innerHTML=rPetty();
  else el.innerHTML=rFund();
}

// ─── ACCOUNT DETAIL VIEW ────────────────────────────────────────────
function showAccDetail(aid){
  const a=S.accounts.find(x=>x.id===aid);if(!a)return;
  const bal=accBal(aid);
  const txList=[];
  S.incomes.filter(i=>i.accId===aid&&!i.isFund).forEach(i=>txList.push({...i,_dir:'in'}));
  S.expenses.filter(e=>e.accId===aid&&!e.isFund).forEach(e=>txList.push({...e,_dir:'out'}));
  S.transfers.filter(t=>t.fromId===aid).forEach(t=>{
    const toAcc=S.accounts.find(x=>x.id===t.toId);
    const toCard=t.toCardId?S.cards.find(c=>c.id===t.toCardId):null;
    const toName=toCard?('💳 '+toCard.name):(toAcc?toAcc.name:'?');
    txList.push({...t,_dir:'xfer-out',desc:t.note||('轉至 '+toName),_toName:toName});
  });
  S.transfers.filter(t=>t.toId===aid).forEach(t=>{
    const fa=S.accounts.find(x=>x.id===t.fromId);
    txList.push({...t,_dir:'xfer-in',desc:t.note||('轉入自 '+(fa?fa.name:'?'))});
  });
  txList.sort((a,b)=>b.date-a.date);

  const mc=document.getElementById('mc');
  mc.innerHTML='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+
    '<button onclick="closeM()" style="background:none;border:none;color:var(--textl);cursor:pointer;font-size:22px;padding:0 6px 0 0;line-height:1">&#8249;</button>'+
    '<div style="flex:1">'+
      '<div style="font-size:17px;font-weight:700;color:var(--text)">'+accIcon(a)+' '+a.name+'</div>'+
      '<div style="font-size:11px;color:var(--textl)">'+a.type+'</div>'+
    '</div>'+
    '<div style="text-align:right">'+
      '<div style="font-size:18px;font-weight:700;color:'+(bal>=0?'var(--green)':'var(--maple)')+';">'+(bal<0?'-':'')+fmt(bal)+'</div>'+
      '<div style="font-size:10px;color:var(--textl)">目前餘額</div>'+
    '</div>'+
  '</div>'+
  '<div style="height:.5px;background:var(--bdr);margin-bottom:14px"></div>'+
  (!txList.length?'<div class="empty">還沒有任何交易紀錄</div>':txList.map(e=>{
    const isIn=e._dir==='in'||e._dir==='xfer-in';
    const isXfer=e._dir==='xfer-in'||e._dir==='xfer-out';
    const col=isIn?'var(--green)':'var(--maple)';
    const bg=isIn?'var(--green-ll)':isXfer?'var(--navy-ll)':'var(--yellow-ll)';
    const ico=isXfer?'&#8644;':isIn?'💹':'💵';
    const cc=e.cat?catCol(e.cat):'#9A9298';
    const ctag=e.cat&&!isXfer?'<span class="tag" style="background:'+cc+'20;color:'+cc+';border:.5px solid '+cc+'44">'+catIcon(e.cat)+' '+e.cat+'</span>':'';
    return '<div class="ei"><div class="eirow">'+
      '<div class="eico" style="background:'+bg+'">'+ico+'</div>'+
      '<div class="en"><div class="ename">'+(e.desc||'交易')+'</div>'+
      '<div class="emeta">'+ctag+'<span style="color:var(--textl)">'+fmtD(e.date)+'</span></div></div>'+
      '<div style="font-size:15px;font-weight:700;color:'+col+';">'+(isIn?'+':'-')+fmt(e.amount)+'</div>'+
    '</div></div>';
  }).join(''));
  document.getElementById('mo').style.display='flex';
}

// ─── CARD DETAIL VIEW ────────────────────────────────────────────────
let _cdCid='', _cdY=0, _cdM=0;
function showCardDetail(cid){
  _cdCid=cid;
  const now=new Date();_cdY=now.getFullYear();_cdM=now.getMonth()+1;
  renderCardDetail();
}
function navCardMonth(dir){
  _cdM+=dir;
  if(_cdM>12){_cdM=1;_cdY++;}
  if(_cdM<1){_cdM=12;_cdY--;}
  renderCardDetail();
}
function renderCardDetail(){
  const card=S.cards.find(c=>c.id===_cdCid);if(!card)return;
  const allExps=S.expenses.filter(e=>e.cardId===_cdCid).sort((a,b)=>b.date-a.date);
  const allPays=S.transfers.filter(t=>t.toCardId===_cdCid);
  const mExps=allExps.filter(e=>{const d=new Date(e.date);return d.getFullYear()===_cdY&&d.getMonth()+1===_cdM;});
  const mPays=allPays.filter(t=>{const d=new Date(t.date);return d.getFullYear()===_cdY&&d.getMonth()+1===_cdM;});
  const mTot=mExps.reduce((s,e)=>s+e.amount,0);
  const mPaid=mPays.reduce((s,t)=>s+t.amount,0);
  const tot=allExps.reduce((s,e)=>s+e.amount,0);
  const paidTot=allPays.reduce((s,t)=>s+t.amount,0);
  const unpaid=tot-paidTot;
  const now=new Date();
  const isCurrent=_cdY===now.getFullYear()&&_cdM===now.getMonth()+1;
  const monthLabel=_cdY+'年'+_cdM+'月';

  let h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+
    '<button onclick="closeM()" style="background:none;border:none;color:var(--textl);cursor:pointer;font-size:22px;padding:0 4px 0 0;line-height:1">&#8249;</button>'+
    '<div style="flex:1"><div style="font-size:17px;font-weight:700;color:var(--text)">'+card.name+'</div>'+
    '<div style="font-size:11px;color:var(--textl)">**** '+(card.last4||'????')+'</div></div>'+
    (unpaid>0?
      '<div style="text-align:right"><div style="font-size:11px;color:var(--maple-d);font-weight:600">⚠ 未繳</div><div style="font-size:15px;font-weight:700;color:var(--maple)">'+fmt(unpaid)+'</div></div>':
      '<div style="font-size:11px;color:var(--green);font-weight:600">✓ 已繳清</div>')+
  '</div>';

  h+='<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-radius:20px;padding:6px 6px;margin-bottom:14px">'+
    '<button onclick="navCardMonth(-1)" style="width:34px;height:34px;background:var(--card);border:none;border-radius:50%;cursor:pointer;font-size:18px;color:var(--textm);display:flex;align-items:center;justify-content:center">&#8249;</button>'+
    '<div style="text-align:center">'+
      '<div style="font-size:14px;font-weight:700;color:var(--text)">'+monthLabel+(isCurrent?' <span style="font-size:10px;color:var(--maple);background:var(--maple-ll);padding:1px 6px;border-radius:10px">本月</span>':'')+'</div>'+
      '<div style="font-size:11px;color:var(--textl);margin-top:2px">本月消費 '+fmt(mTot)+(mPays.length?' · 已繳 '+fmt(mPaid):'')+'</div>'+
    '</div>'+
    '<button onclick="navCardMonth(1)" style="width:34px;height:34px;background:var(--card);border:none;border-radius:50%;cursor:pointer;font-size:18px;color:var(--textm);display:flex;align-items:center;justify-content:center">&#8250;</button>'+
  '</div>';

  if(!mExps.length&&!mPays.length){
    h+='<div class="empty">'+monthLabel+'沒有記錄</div>';
  } else {
    if(mExps.length){
      h+='<div class="sec">消費明細</div>';
      mExps.forEach(e=>{
        const cc=e.cat?catCol(e.cat):'#9A9298';
        const ctag=e.cat?'<span class="tag" style="background:'+cc+'20;color:'+cc+';border:.5px solid '+cc+'44">'+catIcon(e.cat)+' '+e.cat+'</span>':'';
        let ib='';
        if(e.inst&&e.inst.on){
          const b=getBilled(e);
          const cp=Math.max(0,Math.min(e.inst.periods,b));
          const done=b>=e.inst.periods;
          const pt=Math.min(100,Math.round(cp/e.inst.periods*100));
          const statTxt=b<=0?'未出帳':(done?'✓ 已付清':'第'+cp+'/'+e.inst.periods+'期');
          ib='<div style="margin-top:7px;padding-top:7px;border-top:.5px solid var(--bdr)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:'+(done?'var(--yellow)':'var(--plum)')+';font-weight:500">'+statTxt+'</span><span style="font-size:11px;color:var(--textl)">每期 '+fmt(e.inst.monthly)+'</span></div><div style="background:var(--surf);height:4px;border-radius:2px;overflow:hidden"><div style="height:100%;background:'+(done?'var(--yellow)':'var(--plum)')+';width:'+pt+'%"></div></div></div>';
        }
        h+='<div class="ei"><div class="eirow">'+
          '<div class="eico" style="background:var(--navy-ll)">💳</div>'+
          '<div class="en"><div class="ename">'+(e.desc||'刷卡消費')+'</div><div class="emeta">'+ctag+'<span style="color:var(--textl)">'+fmtD(e.date)+'</span></div></div>'+
          '<div style="text-align:right;flex-shrink:0"><div style="font-size:15px;font-weight:700;color:var(--navy)">-'+fmt(e.amount)+'</div><button class="db" onclick="event.stopPropagation();delExp(\''+e.id+'\');renderCardDetail()">✕</button></div>'+
        '</div>'+ib+'</div>';
      });
    }
    if(mPays.length){
      h+='<div class="sec" style="margin-top:10px">本月繳費</div>';
      mPays.forEach(t=>{
        const fa=S.accounts.find(a=>a.id===t.fromId);
        h+='<div class="ei"><div class="eirow">'+
          '<div class="eico" style="background:var(--green-ll)">💸</div>'+
          '<div class="en"><div class="ename">'+(t.note||'繳費')+'</div><div class="emeta"><span style="color:var(--textl)">'+(fa?fa.name:'?')+' · '+fmtD(t.date)+'</span></div></div>'+
          '<div style="font-size:15px;font-weight:700;color:var(--green)">+'+fmt(t.amount)+'</div>'+
        '</div></div>';
      });
    }
  }
  document.getElementById('mc').innerHTML=h;
  document.getElementById('mo').style.display='flex';
}

// ─── ENTRY CARD ─────────────────────────────────────────────────────
function eiCard(e){
  const isInc=e._t==='inc';
  const col=isInc?'var(--green)':e.method==='刷卡'?'var(--navy)':e.method==='零用金'?'var(--bean)':'var(--yellow)';
  const bg=isInc?'var(--green-ll)':e.method==='刷卡'?'var(--navy-ll)':e.method==='零用金'?'var(--bean-ll)':'var(--yellow-ll)';
  const ico=isInc?'💹':e.method==='刷卡'?'💳':e.method==='零用金'?'🏢':'💵';
  const cc=e.cat?catCol(e.cat):'#9A9298';
  const ctag=e.cat?'<span class="tag" style="background:'+cc+'20;color:'+cc+';border:.5px solid '+cc+'44">'+catIcon(e.cat)+' '+e.cat+'</span>':'';
  const card=e.cardId?S.cards.find(c=>c.id===e.cardId):null;
  const cardtag=card?'<span class="tag" style="background:var(--navy-ll);color:var(--navy)">'+card.name+'</span>':'';
  const itag=e.inst&&e.inst.on?'<span class="tag" style="background:var(--plum-ll);color:var(--plum)">'+Math.max(0,Math.min(e.inst.periods,getBilled(e)))+'/'+e.inst.periods+'期</span>':'';
  const acc=e.accId?S.accounts.find(a=>a.id===e.accId):null;
  const atag=acc?'<span class="tag" style="background:'+accCol(acc)+'20;color:'+accCol(acc)+'">'+accIcon(acc)+' '+acc.name+'</span>':'';
  const delfn=isInc?'delInc(\''+e.id+'\')':'delExp(\''+e.id+'\')';
  let ibar='';
  if(!isInc&&e.inst&&e.inst.on){
    const b=getBilled(e);
    const cp=Math.max(0,Math.min(e.inst.periods,b));
    const done=b>=e.inst.periods;
    const pt=Math.min(100,Math.round(cp/e.inst.periods*100));
    const statTxt=b<=0?'未出帳':(done?'✓ 已付清':'第'+cp+'/'+e.inst.periods+'期');
    ibar='<div style="margin-top:7px;padding-top:7px;border-top:.5px solid var(--bdr)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:'+(done?'var(--yellow)':'var(--plum)')+';font-weight:500">'+statTxt+'</span><span style="font-size:11px;color:var(--textl)">每期 '+fmt(e.inst.monthly)+'</span></div><div style="background:var(--surf);height:4px;border-radius:2px;overflow:hidden"><div style="height:100%;background:'+(done?'var(--yellow)':'var(--plum)')+';width:'+pt+'%"></div></div></div>';
  }
  const lpProps='onmousedown="editLp(\''+e.id+'\','+isInc+')" onmouseup="editLpEnd()" onmouseleave="editLpEnd()" ontouchstart="editLp(\''+e.id+'\','+isInc+')" ontouchend="editLpEnd()" ontouchmove="editLpEnd()" style="user-select:none;-webkit-user-select:none"';
  return '<div class="ei" '+lpProps+'><div class="eirow"><div class="eico" style="background:'+bg+'">'+ico+'</div><div class="en"><div class="ename">'+(e.desc||'消費')+'</div><div class="emeta">'+ctag+cardtag+itag+atag+'<span style="color:var(--textl)">'+fmtT(e.date)+'</span></div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:16px;font-weight:700;color:'+(isInc?'var(--green)':col)+'">'+(isInc?'+':'-')+fmt(e.amount)+'</div><button class="db" onclick="event.stopPropagation();'+delfn+'">✕</button></div></div>'+ibar+'</div>';
}

// ─── CHART (週/月/年/全部) ──────────────────────────────────────────
function showChart(period){
  if(period)chartPer=period;
  const now=new Date();
  let exps=S.expenses.filter(e=>personal(e));
  if(chartPer==='today')exps=exps.filter(e=>sameDay(e.date,viewDate));
  else if(chartPer==='week'){const mon=new Date(now);mon.setDate(now.getDate()-(now.getDay()||7)+1);mon.setHours(0,0,0,0);exps=exps.filter(e=>new Date(e.date)>=mon);}
  else if(chartPer==='month')exps=exps.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  else if(chartPer==='year')exps=exps.filter(e=>new Date(e.date).getFullYear()===now.getFullYear());
  const catMap={};exps.forEach(e=>{const c=e.cat||'未分類';catMap[c]=(catMap[c]||0)+e.amount;});
  const items=Object.entries(catMap).map(([c,a])=>({c,a,col:catCol(c)})).sort((a,b)=>b.a-a.a);
  const tot=items.reduce((s,d)=>s+d.a,0);
  let paths='',ang=-Math.PI/2;
  items.forEach(d=>{if(!d.a)return;const sw=d.a/tot*2*Math.PI,ea=ang+sw,lg=sw>Math.PI?1:0,f=v=>v.toFixed(2),cx=75,cy=75,or=68,ir=42;
    paths+='<path d="M'+f(cx+or*Math.cos(ang))+' '+f(cy+or*Math.sin(ang))+' A'+or+' '+or+' 0 '+lg+' 1 '+f(cx+or*Math.cos(ea))+' '+f(cy+or*Math.sin(ea))+' L'+f(cx+ir*Math.cos(ea))+' '+f(cy+ir*Math.sin(ea))+' A'+ir+' '+ir+' 0 '+lg+' 0 '+f(cx+ir*Math.cos(ang))+' '+f(cy+ir*Math.sin(ang))+'Z" fill="'+d.col+'" stroke="var(--card)" stroke-width="2.5"/>';ang=ea;});
  const PBTN=[['today','今日'],['week','本週'],['month','本月'],['year','本年'],['all','全部']];
  document.getElementById('mc').innerHTML=
    '<div class="mtitle">支出分類分析</div>'+
    '<div style="display:flex;gap:5px;justify-content:center;margin-bottom:16px;flex-wrap:wrap">'+
      PBTN.map(([f,L])=>'<button class="mb'+(chartPer===f?' on':'')+'" style="'+(chartPer===f?'background:var(--maple);color:#fff;border-color:transparent':'')+';flex:none;padding:6px 10px;font-size:11px" onclick="showChart(\''+f+'\')">'+L+'</button>').join('')+
    '</div>'+
    '<div style="position:relative;width:150px;height:150px;margin:0 auto 16px">'+
      '<svg viewBox="0 0 150 150" width="150" height="150">'+(paths||'<circle cx="75" cy="75" r="68" fill="var(--surf)" stroke="var(--bdr)" stroke-width="1"/>')+'<circle cx="75" cy="75" r="42" fill="var(--card)"/></svg>'+
      '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none"><div style="font-size:10px;color:var(--textl);margin-bottom:1px">總支出</div><div class="pnum" style="font-size:20px;color:var(--maple-d);letter-spacing:-1px;line-height:1.1">'+fmt(tot)+'</div></div>'+
    '</div>'+
    (!items.length?'<div class="empty">這段時間沒有支出</div>':items.map(d=>{const pt=Math.round(d.a/tot*100);
      return '<div class="chart-row"><div style="width:10px;height:10px;border-radius:50%;background:'+d.col+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--text);font-weight:600">'+catIcon(d.c)+' '+d.c+'</span><span style="color:var(--textl)">'+fmt(d.a)+' · <b style="color:var(--textm)">'+pt+'%</b></span></div><div style="background:var(--surf);height:5px;border-radius:2px;overflow:hidden"><div style="height:100%;background:'+d.col+';width:'+pt+'%"></div></div></div></div>';
    }).join(''))+
    '<button class="ab" style="margin-top:10px" onclick="showCatMgmt()">管理分類</button>';
  document.getElementById('mo').style.display='flex';
}

function doRenameDirect(old,isInc){
  const nw=(document.getElementById('ren-inp-d')?.value||'').trim();
  if(!nw||nw===old){document.getElementById('ren-ov-direct')?.remove();return;}
  const allNames=[...S.categories,...S.customCats.map(c=>c.name),...S.incomeCategories];
  if(allNames.includes(nw)&&nw!==old){alert('名稱已存在');return;}
  if(isInc){const idx=S.incomeCategories.indexOf(old);if(idx>=0)S.incomeCategories[idx]=nw;S.incomes.forEach(i=>{if(i.cat===old)i.cat=nw;});}
  else{const si=S.categories.indexOf(old);if(si>=0)S.categories[si]=nw;else{const ci=S.customCats.findIndex(c=>c.name===old);if(ci>=0)S.customCats[ci].name=nw;}S.expenses.forEach(e=>{if(e.cat===old)e.cat=nw;});}
  save();document.getElementById('ren-ov-direct')?.remove();showCatMgmt();
}

function subAddExpCat(){
  const n=(document.getElementById('new-exp-cat')?.value||'').trim();if(!n)return;
  if([...S.categories,...S.customCats.map(c=>c.name),...S.incomeCategories].includes(n)){alert('名稱已存在');return;}
  S.categories.push(n);save();showCatMgmt();
}
function subAddIncCat(){
  const n=(document.getElementById('new-inc-cat')?.value||'').trim();if(!n)return;
  if([...S.categories,...S.customCats.map(c=>c.name),...S.incomeCategories].includes(n)){alert('名稱已存在');return;}
  S.incomeCategories.push(n);save();showCatMgmt();
}

function confirmDelExpCat(name){
  if(S.categories.length<=1){alert('至少保留一個支出分類');return;}
  if(!confirm('刪除「'+name+'」？已有此分類的記錄不受影響。')){return;}
  S.categories=S.categories.filter(c=>c!==name);save();showCatMgmt();
}
function confirmDelIncCat(name){
  if(S.incomeCategories.length<=1){alert('至少保留一個收入分類');return;}
  if(!confirm('刪除「'+name+'」？已有此分類的記錄不受影響。')){return;}
  S.incomeCategories=S.incomeCategories.filter(c=>c!==name);save();showCatMgmt();
}

function subAddCat(){subAddExpCat();}
function delCat(n){S.customCats=S.customCats.filter(c=>c.name!==n);save();showCatMgmt();}

// ─── CALENDAR ───────────────────────────────────────────────────────
function openCal(){const aEl=document.getElementById('mamt'),dEl=document.getElementById('mdesc');if(aEl)AF._a=aEl.value;if(dEl)AF._d=dEl.value;const[sy,sm]=(AF.date||todayStr()).split('-').map(Number);calView={y:sy,m:sm};_calMode='add';drawCal();}
function drawCal(){
  document.getElementById('cal-ov')?.remove();
  const sel=_calMode==='view'?(viewDate.getFullYear()+'-'+String(viewDate.getMonth()+1).padStart(2,'0')+'-'+String(viewDate.getDate()).padStart(2,'0')):(AF.date||todayStr()),td=todayStr(),{y,m}=calView;
  const fdow=new Date(y,m-1,1).getDay(),dim=new Date(y,m,0).getDate(),diP=new Date(y,m-1,0).getDate();
  const WD=['日','一','二','三','四','五','六'];let cells='';
  for(let i=0;i<fdow;i++)cells+='<div style="padding:7px 0;text-align:center;font-size:13px;color:var(--textl);opacity:.35">'+(diP-fdow+1+i)+'</div>';
  for(let d=1;d<=dim;d++){

  }else if(type==='addPetty'){

      '<div class="fg"><label class="fl">類型</label><div style="display:flex;gap:8px"><label style="flex:1;display:flex;align-items:center;gap:6px;padding:10px;background:var(--maple-ll);border:.5px solid var(--maple-l);border-radius:var(--r);cursor:pointer"><input type="radio" name="ptype" value="exp" checked> <span style="font-size:13px;font-weight:600;color:var(--maple)">支出</span></label><label style="flex:1;display:flex;align-items:center;gap:6px;padding:10px;background:var(--green-ll);border:.5px solid var(--green-l);border-radius:var(--r);cursor:pointer"><input type="radio" name="ptype" value="inc"> <span style="font-size:13px;font-weight:600;color:var(--green)">收入</span></label></div></div>'+
      '<div class="fg"><label class="fl">金額</label><input class="fi" id="mpa" type="number" placeholder="0" inputmode="decimal"></div>'+
      '<div class="fg"><label class="fl">描述（可略）</label><input class="fi" id="mpd" placeholder="描述..."></div>'+
      '<button class="sub" style="background:var(--bean)" onclick="subPetty()">記帳</button>';
  }else if(type==='setPetty'){
    mc.innerHTML='<div class="mtitle">設定零用金額度</div>'+
      '<div class="fg"><label class="fl">零用金總額（元）</label><input class="fi" id="mpb" type="number" value="'+(S.petty.budget||5000)+'" inputmode="decimal"></div>'+
      '<button class="sub" style="background:var(--bean)" onclick="subPettyB()">儲存</button>';
  }else if(type==='fundIn'){
    mc.innerHTML='<div class="mtitle">存入私房錢</div>'+
      '<div class="fg"><label class="fl">金額</label><input class="fi" id="mfa" type="number" placeholder="0" inputmode="decimal"></div>'+
      '<div class="fg"><label class="fl">備註（可略）</label><input class="fi" id="mfd" placeholder="..."></div>'+
      '<button class="sub" style="background:var(--green)" onclick="subFund(\'in\')">存入</button>';
  }else if(type==='fundOut'){
    mc.innerHTML='<div class="mtitle">取出私房錢</div>'+
      '<div class="fg"><label class="fl">金額</label><input class="fi" id="mfa" type="number" placeholder="0" inputmode="decimal"></div>'+
      '<div class="fg"><label class="fl">備註（可略）</label><input class="fi" id="mfd" placeholder="..."></div>'+
      '<button class="sub" style="background:var(--plum)" onclick="subFund(\'out\')">取出</button>';
  }else if(type==='report'){showReport();return;}
  document.getElementById('mo').style.display='flex';
  setTimeout(()=>{const fi=mc.querySelector('.fi');if(fi)fi.focus();},80);
}

// ─── REPORT ─────────────────────────────────────────────────────────
function showReport(){
  const now=new Date();
  const exps=S.expenses.filter(e=>personal(e)&&new Date(e.date).getMonth()===now.getMonth()&&new Date(e.date).getFullYear()===now.getFullYear());
  const incs=S.incomes.filter(i=>!i.isFund&&new Date(i.date).getMonth()===now.getMonth()&&new Date(i.date).getFullYear()===now.getFullYear());
  const tE=exps.reduce((s,e)=>s+e.amount,0),tI=incs.reduce((s,i)=>s+i.amount,0),net=tI-tE;
  const catMap={};exps.forEach(e=>{const c=e.cat||'未分類';catMap[c]=(catMap[c]||0)+e.amount;});
  const catItems=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  document.getElementById('mc').innerHTML='<div class="mtitle">'+now.getMonth()+1+' 月結算報告</div>'+
    '<div class="row2"><div class="sc" style="border-top:2.5px solid var(--maple)"><div class="sl">總支出</div><div class="sv" style="color:var(--maple)">'+fmt(tE)+'</div></div><div class="sc" style="border-top:2.5px solid var(--green)"><div class="sl">總收入</div><div class="sv" style="color:var(--green)">'+fmt(tI)+'</div></div></div>'+
    '<div class="sc" style="margin-bottom:14px;text-align:center;border-top:2.5px solid '+(net>=0?'var(--green)':'var(--maple)')+'"><div class="sl">'+(net>=0?'本月結餘':'本月超支')+'</div><div class="sv" style="color:'+(net>=0?'var(--green)':'var(--maple)')+';font-size:22px">'+(net>=0?'+':'')+fmt(Math.abs(net))+' 元</div></div>'+
    '<div class="sec">支出分類</div>'+
    (!catItems.length?'<div class="empty">本月沒有支出</div>':catItems.map(([c,a])=>{const pt=Math.round(a/tE*100),cc=catCol(c);
      return '<div class="chart-row"><div style="width:10px;height:10px;border-radius:50%;background:'+cc+';flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--text);font-weight:600">'+catIcon(c)+' '+c+'</span><span style="color:var(--textl)">'+fmt(a)+' · <b style="color:var(--textm)">'+pt+'%</b></span></div><div style="background:var(--surf);height:5px;border-radius:2px;overflow:hidden"><div style="height:100%;background:'+cc+';width:'+pt+'%"></div></div></div></div>';
    }).join(''));
  document.getElementById('mo').style.display='flex';
}

// ─── SUBMIT ─────────────────────────────────────────────────────────
function closeM(){document.getElementById('mo').style.display='none';}
function closeOnBg(e){if(e.target===document.getElementById('mo'))closeM();}

function subAdd(){
  const amt=parseFloat(document.getElementById('mamt')?.value);if(!amt||amt<=0)return;
  const desc=document.getElementById('mdesc')?.value||'';
  const ts=dateToTs(AF.date||todayStr());

  // ── 信用卡繳費轉帳 ──────────────────────────────
  if(AF.type==='xfer'){
    if(!AF.accId){alert('請選擇轉出帳戶');return;}
    if(!AF.cardId){alert('請選擇要繳費的信用卡');return;}
    const card=S.cards.find(c=>c.id===AF.cardId);
    const cardName=card?card.name:'信用卡';
    // 只建立一筆轉帳記錄，避免帳戶被雙重扣款
    S.transfers.push({
      id:uid(),date:ts,
      fromId:AF.accId,
      toId:'__card_payment__',  // 信用卡還款不是真實帳戶轉入
      toCardId:AF.cardId,
      amount:amt,
      note:desc||('繳 '+cardName+' 帳單')
    });
    save();closeM();render();return;
  }
  if(AF.editingId){
    if(AF.type==='inc'){
      const item=S.incomes.find(i=>i.id===AF.editingId);
      if(item){item.date=ts;item.amount=amt;item.desc=desc;item.cat=AF.incCat;item.method=AF.method;item.accId=AF.method!=='零用金'?AF.accId:null;}
    }else{
      const item=S.expenses.find(e=>e.id===AF.editingId);
      if(item){item.date=ts;item.amount=amt;item.desc=desc;item.cat=AF.cat;item.method=AF.method;item.accId=AF.method!=='零用金'?AF.accId:null;
        if(AF.method==='刷卡'){item.cardId=AF.cardId;if(AF.inst){const p=parseInt(document.getElementById('mperd')?.value)||AF.periods;item.inst={on:true,periods:p,monthly:Math.ceil(amt/p)};}else delete item.inst;}
        else{delete item.cardId;delete item.inst;}}
    }
    AF.editingId=null;
  }else{
    if(AF.type==='inc')S.incomes.push({id:uid(),date:ts,amount:amt,desc,cat:AF.incCat,method:AF.method,accId:AF.method!=='零用金'?AF.accId:null,isFund:false});
    else{const exp={id:uid(),date:ts,amount:amt,desc,cat:AF.cat,method:AF.method,accId:AF.method!=='零用金'?AF.accId:null,isFund:false};
      if(AF.method==='刷卡'){if(AF.cardId)exp.cardId=AF.cardId;if(AF.inst){const p=parseInt(document.getElementById('mperd')?.value)||AF.periods;exp.inst={on:true,periods:p,monthly:Math.ceil(amt/p)};}}
      S.expenses.push(exp);}
  }
  save();closeM();render();
}
function subSettings(){const b=parseFloat(document.getElementById('mbudget')?.value);const p=parseFloat(document.getElementById('mpetty')?.value);if(b>0)S.budget=b;if(p>0)S.petty.budget=p;save();closeM();render();}
function subCard(){const n=(document.getElementById('mcn')?.value||'').trim();if(!n)return;S.cards.push({id:uid(),name:n,last4:document.getElementById('mcl4')?.value||'????',billingCycle:document.getElementById('mcb')?.value||'?',statementDate:document.getElementById('mcs')?.value||'?',dueDate:document.getElementById('mcd')?.value||'?'});save();closeM();render();}
function subAcc(){const n=(document.getElementById('aname')?.value||'').trim();if(!n)return;const t=document.getElementById('atype-sel')?.value||'現金';const b=parseFloat(document.getElementById('ainitbal')?.value)||0;S.accounts.push({id:uid(),name:n,type:t,initBal:b});save();closeM();if(tab==='accounts')renderBody();else render();}
function subXfer(){
  const amt=parseFloat(document.getElementById('xamt')?.value);if(!amt||amt<=0)return;
  const fromId=document.getElementById('xfrom')?.value,toId=document.getElementById('xto')?.value;
  if(!fromId||!toId||fromId===toId){alert('請選擇不同的帳戶');return;}
  const note=document.getElementById('xnote')?.value||'';
  S.transfers.push({id:uid(),date:Date.now(),fromId,toId,amount:amt,note});
  save();closeM();if(tab==='accounts')renderBody();else render();
}
function subPetty(){const a=parseFloat(document.getElementById('mpa')?.value);if(!a||a<=0)return;S.expenses.push({id:uid(),date:Date.now(),amount:a,desc:document.getElementById('mpd')?.value||'',method:'零用金',cat:'公司',isFund:false});save();closeM();render();}
function subPettyB(){const v=parseFloat(document.getElementById('mpb')?.value);if(v>0){S.petty.budget=v;save();closeM();render();}}
function subFund(type){
  const a=parseFloat(document.getElementById('mfa')?.value);if(!a||a<=0)return;
  const desc=document.getElementById('mfd')?.value||'';
  if(type==='in'){S.fund.balance+=a;S.incomes.push({id:uid(),date:Date.now(),amount:a,desc,method:'私房錢',cat:'其他',isFund:true});}
  else{S.fund.balance=Math.max(0,S.fund.balance-a);S.expenses.push({id:uid(),date:Date.now(),amount:a,desc,method:'私房錢',cat:'其他',isFund:true});}
  save();closeM();render();
}
function delExp(id){S.expenses=S.expenses.filter(e=>e.id!==id);save();render();}
function delInc(id){S.incomes=S.incomes.filter(i=>i.id!==id);save();render();}
function delXfer(id){S.transfers=S.transfers.filter(t=>t.id!==id);save();if(tab==='accounts')renderBody();else render();}
function delFundExp(id){const e=S.expenses.find(x=>x.id===id);if(e){S.fund.balance+=e.amount;S.expenses=S.expenses.filter(x=>x.id!==id);}save();render();}
function delFundInc(id){const i=S.incomes.find(x=>x.id===id);if(i){S.fund.balance=Math.max(0,S.fund.balance-i.amount);S.incomes=S.incomes.filter(x=>x.id!==id);}save();render();}
function delCard(id){S.cards=S.cards.filter(c=>c.id!==id);save();render();}
function delAcc(id){if(S.accounts.length<=1){alert('至少保留一個帳戶');return;}S.accounts=S.accounts.filter(a=>a.id!==id);S.transfers=S.transfers.filter(t=>t.fromId!==id&&t.toId!==id);save();if(tab==='accounts')renderBody();else render();}

load();
</script>
