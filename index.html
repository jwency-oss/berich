<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Berich</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#F4EBE8;--surf:#EBE0DC;--card:#FAF5F2;
          --maple:#B85550;--maple-d:#8A3530;--maple-l:#CC7A74;--maple-ll:#F0D8D5;
          --m-green:#768A7E; --m-blue:#5D6D7E; --m-bean:#A3B18A; --m-purple:#9B8EB8;
          --text:#3A2E2C;--textm:#62504C;--textl:#9A9298;
          --bdr:rgba(140,115,110,0.2);--r:13px;
        }
        body{background:var(--bg);color:var(--textm);font-family:-apple-system,'PingFang TC',sans-serif;overscroll-behavior:none}
        .pnum{font-family:Impact,sans-serif !important}
        
        .tab{flex:1;padding:10px 0;background:none;border:none;border-bottom:2.5px solid transparent;font-size:13px;color:var(--textl);cursor:pointer;transition:0.2s}
        .tab.on{font-weight:600}
        .tab[data-c="y"].on{color:var(--m-green);border-bottom-color:var(--m-green)}
        .tab[data-c="b"].on{color:var(--m-blue);border-bottom-color:var(--m-blue)}
        .tab[data-c="p"].on{color:var(--m-bean);border-bottom-color:var(--m-bean)}
        .tab[data-c="r"].on{color:var(--m-purple);border-bottom-color:var(--m-purple)}

        .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
        .sc{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px}
        .sl{font-size:11px;color:var(--textl);margin-bottom:3px}
        .sv{font-size:20px;font-weight:500}
        
        .ei{display:flex;flex-direction:column;background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
        .eirow{display:flex;align-items:center;gap:9px}
        .eico{width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
        .en{flex:1;min-width:0}
        .ename{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .emeta{font-size:11px;color:var(--textl);margin-top:2px}
        .db{background:none;border:none;color:var(--textl);cursor:pointer;font-size:13px;padding:5px}
        
        .fi{width:100%;padding:10px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
        .mb{flex:1;padding:8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);font-size:13px;cursor:pointer;transition:0.2s}
        .mb.on{color:#fff;border-color:transparent}
        .sub{width:100%;padding:12px;color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;margin-top:10px}
        
        .cat-tag{padding:6px 10px;border-radius:15px;font-size:12px;background:var(--surf);border:1px solid var(--bdr);margin:0 6px 8px 0;display:inline-block;cursor:pointer}
        .cat-tag.on{background:var(--m-green);color:#fff;border-color:var(--m-green)}
        .chart-bar{height:8px;background:var(--surf);border-radius:4px;display:flex;overflow:hidden;margin:10px 0}
        .c-seg{height:100%}

        .date-nav{display:flex;align-items:center;justify-content:space-between;padding:0 10px;margin-bottom:10px}
        .date-btn{background:var(--surf);border:none;font-size:12px;color:var(--textm);cursor:pointer;padding:6px 12px;border-radius:15px}
        .date-label{font-size:14px;font-weight:600;color:var(--textm)}
        .dh{font-size:12px;color:var(--textm);font-weight:700;margin:15px 0 6px 4px;letter-spacing:0.5px}
        
        /* 信用卡專屬樣式 */
        .ccard{border-radius:15px;padding:16px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden}
        .cc-del{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer}
    </style>
</head>
<body>

<div id="W" style="height:100vh;overflow:hidden;position:relative;max-width:420px;margin:0 auto;background:var(--bg)">
  <div id="scroll" style="height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:84px">

    <div style="display:flex;flex-direction:column;align-items:center;padding:15px 16px 5px;position:relative">
      <button onclick="showM('settings')" style="position:absolute;top:16px;right:16px;background:var(--maple-ll);border:none;width:30px;height:30px;border-radius:50%;color:var(--maple-d)">⚙</button>

      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="position:relative;width:150px;height:150px">
          <svg style="position:absolute;inset:0" viewBox="0 0 162 162">
            <circle cx="81" cy="81" r="78" fill="white" stroke="var(--maple-ll)" stroke-width="1.5"/>
            <circle cx="81" cy="81" r="69" fill="none" stroke="#EDD0CC" stroke-width="9"/>
            <circle id="prog-ring" cx="81" cy="81" r="69" fill="none" stroke="var(--maple)" stroke-width="9"
              stroke-dasharray="433" stroke-dashoffset="0" stroke-linecap="round"
              transform="rotate(-90 81 81)" style="transition:0.6s"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:10px;color:var(--maple);font-weight:700">總預算剩餘</div>
            <div id="hamt" class="pnum" style="font-size:32px;color:var(--maple-d)">$0</div>
            <div id="hspent" style="font-size:9px;color:var(--maple-l)">已支出 $0</div>
          </div>
        </div>
        <div style="width:10px;background:linear-gradient(var(--maple),var(--maple-l));height:14px;border-radius:0 0 5px 5px;margin-top:-1px"></div>
        <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(150deg,var(--m-purple),#7A70A8);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-1px;box-shadow:0 4px 10px rgba(155,142,184,.3)">
          <div style="font-size:9px;color:rgba(255,255,255,.9)">私房錢</div>
          <div id="fund-disp" class="pnum" style="font-size:16px;color:#fff">$0</div>
        </div>
      </div>
    </div>

    <div style="display:flex;padding:5px 16px 0;gap:4px">
      <button class="tab on" data-c="y" onclick="setTab('today',this,'y')">今日記帳</button>
      <button class="tab" data-c="b" onclick="setTab('cards',this,'b')">信用卡</button>
      <button class="tab" data-c="p" onclick="setTab('petty',this,'p')">零用金</button>
      <button class="tab" data-c="r" onclick="setTab('fund',this,'r')">私房錢</button>
    </div>

    <div id="body" style="padding:14px 16px 0"></div>
  </div>

  <button id="fab" onclick="showM('add')" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--m-green);color:#fff;width:56px;height:56px;border-radius:50%;border:none;font-size:28px;box-shadow:0 4px 15px rgba(0,0,0,0.15)">+</button>

  <div id="mo" onclick="closeOnBg(event)" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end">
    <div style="background:var(--card);border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:85%;overflow-y:auto">
      <div id="mc"></div>
    </div>
  </div>
</div>

<script>
let S = {
    budget: 1000,
    expenses: [],
    incomes: [],
    cards: [], // 信用卡儲存區
    categories: ['飲食','投資','保險','追星','寵物','交通','機車','交際','公司','自訂一','自訂二','自訂三'],
    incomeCategories: ['薪資','外快','獎金','紅包','利息股利','報帳回饋','網拍二手','自訂一','自訂二','自訂三'],
    fund: {balance: 0}
};

let viewDate = new Date();
const FABCOL = {y:'#768A7E', b:'#5D6D7E', p:'#A3B18A', r:'#9B8EB8'};
const CAT_COLORS = ['#768A7E', '#5D6D7E', '#A3B18A', '#9B8EB8', '#B85550', '#C9A85C', '#7A9CB2'];
const CC_BG = ['linear-gradient(140deg,#5D6D7E,#3A4A5A)','linear-gradient(140deg,#768A7E,#506558)','linear-gradient(140deg,#A3B18A,#7A8C62)','linear-gradient(140deg,#9B8EB8,#7A70A8)','linear-gradient(140deg,#C9A85C,#9E8345)'];

// 全域表單狀態
let AF = {type:'exp', cat:'飲食', date:'', method:'現金', cardId:null, inst:false, periods:3};

function load(){
    const saved = localStorage.getItem('Berich_Data_V5');
    if(saved) Object.assign(S, JSON.parse(saved));
    if(!S.cards) S.cards = [];
    render();
}
function save(){ localStorage.setItem('Berich_Data_V5', JSON.stringify(S)); }

function render(){
    const dStr = viewDate.toDateString();
    const tExp = S.expenses.filter(e => !e.isFund && new Date(e.date).toDateString() === dStr).reduce((a,b)=>a+b.amount,0);
    const rem = S.budget - tExp;
    
    document.getElementById('hamt').textContent = '$' + Math.max(0, rem).toLocaleString();
    document.getElementById('hspent').textContent = '已支出 $' + tExp.toLocaleString();
    document.getElementById('fund-disp').textContent = '$' + S.fund.balance.toLocaleString();
    
    const ring = document.getElementById('prog-ring');
    if(ring) ring.setAttribute('stroke-dashoffset', Math.round(433 * (1 - Math.max(0, rem/S.budget))));
    
    renderBody();
}

function changeDate(n){
    viewDate.setDate(viewDate.getDate() + n);
    render();
}

function renderBody(){
    const el = document.getElementById('body');
    const dStr = viewDate.toDateString();

    if(tab === 'today'){
        const tExp = S.expenses.filter(e => !e.isFund && new Date(e.date).toDateString() === dStr).reduce((a,b)=>a+b.amount,0);
        const tInc = S.incomes.filter(i => !i.isFund && new Date(i.date).toDateString() === dStr).reduce((a,b)=>a+b.amount,0);

        el.innerHTML = `
            <div class="date-nav">
                <button class="date-btn" onclick="changeDate(-1)">❮ 前一天</button>
                <div class="date-label">${viewDate.toLocaleDateString('zh-TW', {month:'long', day:'numeric'})}</div>
                <button class="date-btn" onclick="changeDate(1)">後一天 ❯</button>
            </div>
            <div class="row2">
                <div class="sc" style="border-left:3px solid var(--maple)"><div class="sl">單日支出</div><div class="sv" style="color:var(--maple)">$${tExp.toLocaleString()}</div></div>
                <div class="sc" style="border-left:3px solid var(--m-green)"><div class="sl">單日收入</div><div class="sv" style="color:var(--m-green)">$${tInc.toLocaleString()}</div></div>
            </div>
            <div style="background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:12px">
                <div class="sl">單日類別占比</div>
                ${renderChart()}
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0 5px">
                <div style="font-size:13px;font-weight:700;color:var(--text)">📖 所有歷史紀錄 (向下滑動)</div>
                <button onclick="showM('report')" style="font-size:11px;color:var(--m-blue);background:var(--m-blue-ll);border:none;padding:4px 10px;border-radius:10px;cursor:pointer">本月結算</button>
            </div>
            ${renderList('today')}
        `;
    } 
    else if (tab === 'cards') {
        const cExp = S.expenses.filter(e => e.method === '刷卡').reduce((a,b)=>a+b.amount,0);
        
        // 渲染信用卡列表
        let cardsHtml = '';
        if(!S.cards.length) {
            cardsHtml = '<div style="text-align:center;padding:20px;color:var(--textl);font-size:13px">還沒有信用卡，點擊下方新增</div>';
        } else {
            S.cards.forEach((card, i) => {
                const bg = CC_BG[i % CC_BG.length];
                cardsHtml += `
                <div class="ccard" style="background:${bg}">
                    <button class="cc-del" onclick="delCard('${card.id}')">✕</button>
                    <div style="font-size:16px;font-weight:600;margin-bottom:4px">${card.name}</div>
                    <div style="font-size:12px;opacity:0.8;letter-spacing:2px;margin-bottom:12px">**** ${card.last4}</div>
                    <div style="display:flex;gap:15px;font-size:11px">
                        <div>結帳日: 每月 ${card.statementDate} 日</div>
                        <div>繳款日: 每月 ${card.dueDate} 日</div>
                    </div>
                </div>`;
            });
        }

        el.innerHTML = `
            ${cardsHtml}
            <button onclick="showM('addCard')" style="width:100%;padding:12px;background:none;border:1px dashed var(--m-blue);border-radius:var(--r);color:var(--m-blue);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:20px">＋ 新增信用卡</button>
            <div class="sc" style="border-left:3px solid var(--m-blue);margin-bottom:15px"><div class="sl">累計刷卡總額</div><div class="sv" style="color:var(--m-blue)">$${cExp.toLocaleString()}</div></div>
            <div class="sec">💳 刷卡明細</div>
            ${renderList('cards')}
        `;
    }
    else if (tab === 'petty') {
        const pExp = S.expenses.filter(e => e.method === '零用金').reduce((a,b)=>a+b.amount,0);
        el.innerHTML = `
            <div class="sc" style="border-left:3px solid var(--m-bean);margin-bottom:15px"><div class="sl">累計零用金支出</div><div class="sv" style="color:var(--maple)">$${pExp.toLocaleString()}</div></div>
            <div class="sec">🏢 零用金明細</div>
            ${renderList('petty')}
        `;
    }
    else if (tab === 'fund') {
        el.innerHTML = `<div class="sec" style="margin-bottom:15px">🔮 私房錢進出紀錄</div>${renderList('fund')}`;
    }
}

function renderChart(){
    const dStr = viewDate.toDateString();
    const exps = S.expenses.filter(e => !e.isFund && new Date(e.date).toDateString() === dStr);
    if(!exps.length) return `<div style="font-size:12px;color:var(--textl)">本日尚無支出</div>`;
    const totals = {}; exps.forEach(e => totals[e.cat] = (totals[e.cat]||0) + e.amount);
    const sum = exps.reduce((a,b)=>a+b.amount,0);
    let bars = '', legs = '';
    Object.keys(totals).forEach((c, i) => {
        const p = (totals[c]/sum*100).toFixed(0);
        const col = CAT_COLORS[i%CAT_COLORS.length];
        bars += `<div class="c-seg" style="width:${p}%;background:${col}"></div>`;
        legs += `<span style="font-size:10px;margin-right:8px"><i style="width:6px;height:6px;background:${col};display:inline-block;border-radius:50%"></i> ${c} ${p}%</span>`;
    });
    return `<div class="chart-bar">${bars}</div><div style="display:flex;flex-wrap:wrap">${legs}</div>`;
}

function renderList(filterTab){
    let items = [];
    if(filterTab === 'today') items = [...S.expenses, ...S.incomes].filter(e => !e.isFund);
    else if (filterTab === 'cards') items = S.expenses.filter(e => e.method === '刷卡');
    else if (filterTab === 'petty') items = S.expenses.filter(e => e.method === '零用金');
    else if (filterTab === 'fund') items = [...S.expenses, ...S.incomes].filter(e => e.isFund);

    items.sort((a,b) => new Date(b.date) - new Date(a.date));
    if(!items.length) return `<div style="text-align:center;padding:30px 0;color:var(--textl)">此區塊目前沒有紀錄喔</div>`;

    let html = '';
    let lastDateStr = '';

    items.forEach(e => {
        const itemDate = new Date(e.date);
        const dateHeader = itemDate.toLocaleDateString('zh-TW', {month:'long', day:'numeric', weekday:'short'});
        
        if(dateHeader !== lastDateStr) {
            html += `<div class="dh">${dateHeader}</div>`;
            lastDateStr = dateHeader;
        }

        const isInc = e.type === 'inc';
        const color = isInc ? 'var(--m-green)' : 'var(--maple)';
        const sign = isInc ? '+' : '-';
        const icon = isInc ? '💰' : (e.method==='刷卡'?'💳':(e.method==='零用金'?'🏢':'💸'));

        // 刷卡專屬標籤
        let extraTag = '';
        if(!isInc && e.method === '刷卡') {
            const card = S.cards.find(c => c.id === e.cardId);
            if(card) extraTag += `<span style="background:var(--surf);padding:2px 6px;border-radius:4px;font-size:10px;color:var(--m-blue);margin-left:4px">${card.name}</span>`;
            if(e.installment?.enabled) extraTag += `<span style="background:var(--m-blue);color:#fff;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:4px">分${e.installment.periods}期</span>`;
        }

        html += `
        <div class="ei"><div class="eirow">
            <div class="eico" style="background:var(--surf)">${icon}</div>
            <div class="en">
                <div class="ename">${e.desc||e.cat}</div>
                <div class="emeta">${e.cat} ${e.method ? '· '+e.method : ''} ${extraTag}</div>
            </div>
            <div style="text-align:right">
                <div style="font-size:15px;font-weight:600;color:${color}">${sign}$${e.amount.toLocaleString()}</div>
                <button class="db" onclick="delItem('${e.id}','${e.type}')">刪除</button>
            </div>
        </div></div>`;
    });

    return html;
}

function showM(type){
    const mc = document.getElementById('mc');
    if(type === 'add'){
        AF.type = (tab === 'fund') ? 'exp' : 'exp';
        AF.date = new Date().toISOString().split('T')[0];
        AF.method = '現金';
        AF.cardId = S.cards.length ? S.cards[0].id : null;
        AF.inst = false;
        AF.periods = 3;
        if(!S.categories.includes(AF.cat)) AF.cat = S.categories[0];
        renderAddModal();
    } 
    else if(type === 'addCard') {
        mc.innerHTML = `
        <div class="mtitle">新增信用卡</div>
        <div class="sl">卡片名稱 (例如：國泰世華、台新玫瑰...)</div><input type="text" id="mcn" class="fi" placeholder="卡片名稱">
        <div class="sl">卡號末四碼</div><input type="number" id="mcl4" class="fi" placeholder="1234">
        <div style="display:flex;gap:10px">
            <div style="flex:1"><div class="sl">結帳日 (每月幾號)</div><input type="number" id="mcs" class="fi" placeholder="5"></div>
            <div style="flex:1"><div class="sl">繳款日 (每月幾號)</div><input type="number" id="mcd" class="fi" placeholder="20"></div>
        </div>
        <button class="sub" style="background:var(--m-blue)" onclick="subCard()">新增卡片</button>`;
    }
    else if(type === 'settings') {
        mc.innerHTML = `
        <div class="mtitle">自訂分類與設定</div>
        <div class="sl">每日花費上限</div><input type="number" id="nbud" class="fi" value="${S.budget}">
        <div class="sl">支出分類名 (請用逗號隔開)</div><input id="cat-list" class="fi" value="${S.categories.join(',')}">
        <div class="sl">收入分類名 (請用逗號隔開)</div><input id="inc-list" class="fi" value="${S.incomeCategories.join(',')}">
        <button class="sub" style="background:var(--m-green)" onclick="S.budget=parseFloat(document.getElementById('nbud').value);S.categories=document.getElementById('cat-list').value.split(',');S.incomeCategories=document.getElementById('inc-list').value.split(',');save();closeM();render();">儲存設定</button>`;
    }
    else if(type === 'report') {
        const now = new Date();
        const mExp = S.expenses.filter(e => !e.isFund && new Date(e.date).getMonth() === now.getMonth()).reduce((a,b)=>a+b.amount,0);
        const mInc = S.incomes.filter(i => !i.isFund && new Date(i.date).getMonth() === now.getMonth()).reduce((a,b)=>a+b.amount,0);
        const diff = mInc - mExp;
        mc.innerHTML = `
            <div class="mtitle">🗓 ${now.getMonth()+1}月 結算報告</div>
            <div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:12px;text-align:center">
                <div class="sl">本月實質損益 (總收入 - 總支出)</div>
                <div style="font-size:26px;font-weight:700;color:${diff>=0?'var(--m-green)':'var(--maple)'};margin:10px 0">${diff>=0?'+':''}$${diff.toLocaleString()}</div>
            </div>
            <button class="sub" style="background:var(--m-green)" onclick="closeM()">關閉</button>`;
    }
    document.getElementById('mo').style.display = 'flex';
}

function subCard(){
    const name = document.getElementById('mcn').value;
    if(!name) return;
    S.cards.push({
        id: Date.now().toString(36),
        name: name,
        last4: document.getElementById('mcl4').value || '????',
        statementDate: document.getElementById('mcs').value || '?',
        dueDate: document.getElementById('mcd').value || '?'
    });
    save(); closeM(); render();
}

function delCard(id){
    S.cards = S.cards.filter(c => c.id !== id);
    save(); render();
}

function renderAddModal(){
    const isFund = (tab === 'fund');
    const cats = AF.type === 'exp' ? S.categories : S.incomeCategories;
    if(!cats.includes(AF.cat)) AF.cat = cats[0];

    let methodHtml = '';
    if(!isFund && AF.type === 'exp') {
        methodHtml = `
        <div class="sl">付款方式</div>
        <div style="display:flex;gap:5px;margin-bottom:12px">
            ${['現金','刷卡','零用金'].map(m => `<button class="mb ${AF.method===m?'on':''}" style="${AF.method===m?'background:var(--m-blue)':''}" onclick="AF.method='${m}';renderAddModal()">${m}</button>`).join('')}
        </div>`;

        // 如果選刷卡，展開信用卡與分期選項
        if(AF.method === '刷卡') {
            methodHtml += `<div style="background:var(--surf);padding:12px;border-radius:var(--r);margin-bottom:15px">`;
            
            if(!S.cards.length) {
                methodHtml += `<div style="font-size:12px;color:var(--textl)">請先至「信用卡」分頁新增卡片</div>`;
            } else {
                methodHtml += `<div class="sl" style="color:var(--m-blue)">選擇信用卡</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
                S.cards.forEach(c => {
                    const on = AF.cardId === c.id;
                    methodHtml += `<button class="mb ${on?'on':''}" style="${on?'background:var(--m-blue)':''};flex:none;padding:6px 12px" onclick="AF.cardId='${c.id}';renderAddModal()">${c.name}</button>`;
                });
                methodHtml += `</div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <div class="sl" style="margin:0">分期設定</div>
                    <button onclick="AF.inst=!AF.inst;renderAddModal()" style="background:${AF.inst?'var(--m-blue)':'transparent'};color:${AF.inst?'#fff':'var(--textl)'};border:1px solid ${AF.inst?'var(--m-blue)':'var(--bdr)'};padding:4px 10px;border-radius:12px;font-size:11px">${AF.inst?'已開啟':'關閉'}</button>
                </div>`;

                if(AF.inst) {
                    methodHtml += `<div style="display:flex;gap:6px">
                        ${[3,6,12].map(p => `<button class="mb ${AF.periods===p?'on':''}" style="${AF.periods===p?'background:var(--m-blue)':''};padding:6px" onclick="AF.periods=${p};renderAddModal()">${p}期</button>`).join('')}
                        <input type="number" class="fi" style="margin:0;width:70px;padding:6px;text-align:center" placeholder="自訂期" value="${AF.periods}" onchange="AF.periods=parseInt(this.value)||1;renderAddModal()">
                    </div>`;
                }
            }
            methodHtml += `</div>`;
        }
    }

    document.getElementById('mc').innerHTML = `
        <div class="mtitle">${isFund ? '🔮 記一筆私房錢' : '✍️ 記帳'}</div>
        <div style="display:flex;background:var(--surf);border-radius:var(--r);padding:4px;margin-bottom:15px">
            <button style="flex:1;padding:8px;border:none;border-radius:10px;background:${AF.type==='exp'?'#fff':'transparent'};font-weight:${AF.type==='exp'?'600':'400'}" onclick="AF.type='exp';renderAddModal()">${isFund?'取出':'支出'}</button>
            <button style="flex:1;padding:8px;border:none;border-radius:10px;background:${AF.type==='inc'?'#fff':'transparent'};color:var(--m-green);font-weight:${AF.type==='inc'?'600':'400'}" onclick="AF.type='inc';renderAddModal()">${isFund?'存入':'收入'}</button>
        </div>
        
        <div class="sl">補記日期 (預設今天)</div><input type="date" id="mdate" class="fi" value="${AF.date}">
        ${methodHtml}
        <div class="sl">金額</div><input type="number" id="mamt" class="fi" placeholder="0" inputmode="decimal">
        <div class="sl">備註</div><input type="text" id="mdesc" class="fi" placeholder="描述(選填)">
        <div class="sl">分類</div>
        <div style="margin-bottom:15px">${cats.map(c => `<span class="cat-tag ${AF.cat===c?'on':''}" onclick="AF.cat='${c}';renderAddModal()">${c}</span>`).join('')}</div>
        <button class="sub" style="background:${AF.type==='exp'?'var(--maple)':'var(--m-green)'}" onclick="subAdd()">確認${isFund?'':'記帳'}</button>
    `;
}

function subAdd(){
    const amt = parseFloat(document.getElementById('mamt').value); if(!amt) return;
    const isFund = (tab === 'fund');
    
    const item = { 
        id: Date.now().toString(36), 
        date: document.getElementById('mdate').value, 
        amount: amt, 
        desc: document.getElementById('mdesc').value, 
        cat: AF.cat,
        type: AF.type,
        method: isFund ? '私房錢' : (AF.type === 'exp' ? AF.method : '現金'),
        isFund: isFund
    };

    // 如果是刷卡，記錄卡片與分期資訊
    if(!isFund && AF.type === 'exp' && AF.method === '刷卡') {
        item.cardId = AF.cardId;
        if(AF.inst && AF.periods > 0) {
            item.installment = {
                enabled: true,
                periods: AF.periods,
                monthlyAmount: Math.ceil(amt / AF.periods)
            };
        }
    }
    
    if(AF.type === 'exp') S.expenses.push(item); else S.incomes.push(item);
    if(isFund) { if(AF.type === 'exp') S.fund.balance -= amt; else S.fund.balance += amt; }

    save(); closeM(); render();
}

function delItem(id, type){
    let target = null;
    if(type === 'exp') {
        target = S.expenses.find(e=>e.id===id);
        if(target && target.isFund) S.fund.balance += target.amount; 
        S.expenses = S.expenses.filter(e=>e.id!==id);
    } else {
        target = S.incomes.find(i=>i.id===id);
        if(target && target.isFund) S.fund.balance -= target.amount; 
        S.incomes = S.incomes.filter(i=>i.id!==id);
    }
    save(); render();
}

function setTab(t, btn, c){ tab = t; curC = c; document.querySelectorAll('.tab').forEach(b => b.classList.remove('on')); btn.classList.add('on'); document.getElementById('fab').style.background = FABCOL[c]; render(); }
function closeM(){ document.getElementById('mo').style.display='none'; }
function closeOnBg(e){ if(e.target.id==='mo') closeM(); }
load();
</script>
</body>
</html>
