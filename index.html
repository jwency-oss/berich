<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Berich</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
          /* 妳最愛的暖色調 */
          --bg:#F4EBE8;--surf:#EBE0DC;--card:#FAF5F2;
          --maple:#B85550;--maple-d:#8A3530;--maple-l:#CC7A74;--maple-ll:#F0D8D5;
          
          /* 莫蘭迪選項色 */
          --m-green:#768A7E; --m-blue:#5D6D7E; --m-bean:#A3B18A; --m-purple:#9B8EB8;

          --text:#3A2E2C;--textm:#62504C;--textl:#9A9298;
          --bdr:rgba(140,115,110,0.2);--r:13px;
        }
        body{background:var(--bg);color:var(--textm);font-family:-apple-system,'PingFang TC',sans-serif;overscroll-behavior:none}
        .pnum{font-family:Impact,sans-serif !important}
        
        /* 選項標籤 */
        .tab{flex:1;padding:10px 0;background:none;border:none;border-bottom:2.5px solid transparent;font-size:13px;color:var(--textl);cursor:pointer;transition:0.2s}
        .tab.on{font-weight:600}
        .tab[data-c="y"].on{color:var(--m-green);border-bottom-color:var(--m-green)}
        .tab[data-c="b"].on{color:var(--m-blue);border-bottom-color:var(--m-blue)}
        .tab[data-c="p"].on{color:var(--m-bean);border-bottom-color:var(--m-bean)}
        .tab[data-c="r"].on{color:var(--m-purple);border-bottom-color:var(--m-purple)}

        .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
        .sc{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px}
        .sl{font-size:11px;color:var(--textl);margin-bottom:3px}
        .sv{font-size:21px;font-weight:500}
        
        .ei{display:flex;flex-direction:column;background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
        .eirow{display:flex;align-items:center;gap:9px}
        .eico{width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
        .en{flex:1;min-width:0}
        .ename{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .emeta{font-size:11px;color:var(--textl);margin-top:2px}
        .db{background:none;border:none;color:var(--textl);cursor:pointer;font-size:13px;padding:5px}
        
        /* 彈窗與按鈕 */
        .fi{width:100%;padding:10px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-size:14px;outline:none;margin-bottom:10px}
        .mb{flex:1;padding:8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);font-size:13px;cursor:pointer}
        .mb.on{color:#fff;border-color:transparent}
        .sub{width:100%;padding:12px;color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:600;margin-top:10px}
        
        /* 分類標籤 */
        .cat-tag{padding:6px 12px;border-radius:15px;font-size:12px;background:var(--surf);border:1px solid var(--bdr);margin:0 6px 8px 0;display:inline-block;cursor:pointer}
        .cat-tag.on{background:var(--m-green);color:#fff;border-color:var(--m-green)}
        .chart-bar{height:8px;background:var(--surf);border-radius:4px;display:flex;overflow:hidden;margin:10px 0}
        .c-seg{height:100%}
    </style>
</head>
<body>

<div id="W" style="height:100vh;overflow:hidden;position:relative;max-width:420px;margin:0 auto;background:var(--bg)">
  <div id="scroll" style="height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:84px">

    <div style="display:flex;flex-direction:column;align-items:center;padding:20px 16px 10px;position:relative">
      <button onclick="showM('settings')" style="position:absolute;top:16px;right:16px;background:var(--maple-ll);border:none;width:30px;height:30px;border-radius:50%;color:var(--maple-d)">⚙</button>

      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="position:relative;width:162px;height:162px">
          <svg style="position:absolute;inset:0" viewBox="0 0 162 162">
            <circle cx="81" cy="81" r="78" fill="white" stroke="var(--maple-ll)" stroke-width="1.5"/>
            <circle cx="81" cy="81" r="69" fill="none" stroke="#EDD0CC" stroke-width="9"/>
            <circle id="prog-ring" cx="81" cy="81" r="69" fill="none" stroke="var(--maple)" stroke-width="9"
              stroke-dasharray="433" stroke-dashoffset="0" stroke-linecap="round"
              transform="rotate(-90 81 81)" style="transition:0.6s"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:10px;color:var(--maple);font-weight:700;letter-spacing:1px">今日剩餘</div>
            <div id="hamt" class="pnum" style="font-size:38px;color:var(--maple-d)">$0</div>
            <div id="hspent" style="font-size:10px;color:var(--maple-l)">已花 $0</div>
          </div>
        </div>
        <div style="width:10px;background:linear-gradient(var(--maple),var(--maple-l));height:18px;border-radius:0 0 5px 5px;margin-top:-1px"></div>
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(150deg,var(--m-purple),#7A70A8);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-1px;box-shadow:0 4px 12px rgba(155,142,184,.4)">
          <div style="font-size:9px;color:rgba(255,255,255,.9)">私房錢</div>
          <div id="fund-disp" class="pnum" style="font-size:18px;color:#fff">$0</div>
        </div>
      </div>
    </div>

    <div style="display:flex;padding:10px 16px 0;gap:4px">
      <button class="tab on" data-c="y" onclick="setTab('today',this,'y')">今日記帳</button>
      <button class="tab" data-c="b" onclick="setTab('cards',this,'b')">信用卡</button>
      <button class="tab" data-c="p" onclick="setTab('petty',this,'p')">零用金</button>
      <button class="tab" data-c="r" onclick="setTab('fund',this,'r')">私房錢</button>
    </div>

    <div id="body" style="padding:14px 16px 0"></div>
  </div>

  <button id="fab" onclick="showM('add')" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--m-green);color:#fff;width:56px;height:56px;border-radius:50%;border:none;font-size:28px;box-shadow:0 4px 15px rgba(0,0,0,0.15)">+</button>

  <div id="mo" onclick="closeOnBg(event)" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:flex-end">
    <div style="background:var(--card);border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:85%;overflow-y:auto">
      <div id="mc"></div>
    </div>
  </div>
</div>

<script>
// 強大且穩定的儲存機制
let S = {
    budget: 1000,
    expenses: [],
    incomes: [],
    categories: ['飲食','投資','保險','追星','寵物','交通','機車','交際','公司'],
    fund: {balance:0}
};

const FABCOL = {y:'#768A7E', b:'#5D6D7E', p:'#A3B18A', r:'#9B8EB8'};
const CAT_COLORS = ['#768A7E', '#5D6D7E', '#A3B18A', '#9B8EB8', '#B85550', '#C9A85C', '#7A9CB2'];
let tab = 'today', curC = 'y', AF = {type:'exp', cat:'飲食'};

// 讀取資料
function load(){
    const saved = localStorage.getItem('Berich_Data_Final');
    if(saved) {
        const parsed = JSON.parse(saved);
        // 確保新功能欄位存在
        if(parsed.incomes) S.incomes = parsed.incomes;
        if(parsed.expenses) S.expenses = parsed.expenses;
        if(parsed.budget) S.budget = parsed.budget;
        if(parsed.fund) S.fund = parsed.fund;
        if(parsed.categories) S.categories = parsed.categories;
    }
    render();
}

// 儲存資料
function save(){
    localStorage.setItem('Berich_Data_Final', JSON.stringify(S));
}

function render(){
    const today = new Date().toDateString();
    const tExp = S.expenses.filter(e => new Date(e.date).toDateString() === today).reduce((a,b)=>a+b.amount,0);
    const tInc = S.incomes.filter(i => new Date(i.date).toDateString() === today).reduce((a,b)=>a+b.amount,0);
    const rem = S.budget - tExp + tInc;
    
    document.getElementById('hamt').textContent = '$' + Math.max(0, rem).toLocaleString();
    document.getElementById('hspent').textContent = '已花 $' + tExp.toLocaleString();
    document.getElementById('fund-disp').textContent = '$' + S.fund.balance.toLocaleString();
    
    const ring = document.getElementById('prog-ring');
    if(ring) ring.setAttribute('stroke-dashoffset', Math.round(433 * (1 - Math.max(0, rem/S.budget))));
    
    renderBody(tExp, tInc);
}

function renderBody(tExp, tInc){
    const el = document.getElementById('body');
    if(tab === 'today'){
        el.innerHTML = `
            <div class="row2">
                <div class="sc" style="border-left:3px solid var(--maple)"><div class="sl">今日支出</div><div class="sv" style="color:var(--maple)">$${tExp.toLocaleString()}</div></div>
                <div class="sc" style="border-left:3px solid var(--m-green)"><div class="sl">今日收入</div><div class="sv" style="color:var(--m-green)">$${tInc.toLocaleString()}</div></div>
            </div>
            <div style="background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:15px">
                <div class="sl">支出類別占比</div>
                ${renderChart()}
            </div>
            <div class="sec">今日明細</div>
            ${renderList()}
        `;
    } else { el.innerHTML = `<div style="text-align:center;color:var(--textl);padding:40px">此功能分頁同步優化中</div>`; }
}

function renderChart(){
    const today = new Date().toDateString();
    const exps = S.expenses.filter(e => new Date(e.date).toDateString() === today);
    if(!exps.length) return `<div style="font-size:12px;color:var(--textl)">尚無支出</div>`;
    const totals = {}; exps.forEach(e => totals[e.cat] = (totals[e.cat]||0) + e.amount);
    const sum = exps.reduce((a,b)=>a+b.amount,0);
    let bars = '', legs = '';
    Object.keys(totals).forEach((c, i) => {
        const p = (totals[c]/sum*100).toFixed(0);
        const col = CAT_COLORS[i%CAT_COLORS.length];
        bars += `<div class="c-seg" style="width:${p}%;background:${col}"></div>`;
        legs += `<span style="font-size:10px;margin-right:8px"><i style="width:6px;height:6px;background:${col};display:inline-block;border-radius:50%"></i> ${c} ${p}%</span>`;
    });
    return `<div class="chart-bar">${bars}</div><div style="display:flex;flex-wrap:wrap">${legs}</div>`;
}

function renderList(){
    const today = new Date().toDateString();
    const all = [
        ...S.expenses.filter(e => new Date(e.date).toDateString() === today).map(e => ({...e, type:'exp'})),
        ...S.incomes.filter(i => new Date(i.date).toDateString() === today).map(i => ({...i, type:'inc'}))
    ].sort((a,b)=>b.date - a.date);
    if(!all.length) return `<div style="text-align:center;padding:20px;color:var(--textl)">還沒有紀錄喔</div>`;
    return all.map(e => `
        <div class="ei"><div class="eirow">
            <div class="eico" style="background:var(--surf)">${e.type==='exp'?'💸':'💰'}</div>
            <div class="en"><div class="ename">${e.desc||e.cat}</div><div class="emeta">${e.cat}</div></div>
            <div style="text-align:right">
                <div style="font-size:15px;font-weight:600;color:${e.type==='exp'?'var(--maple)':'var(--m-green)'}">
                    ${e.type==='exp'?'-':'+'}$${e.amount.toLocaleString()}
                </div>
                <button class="db" onclick="delItem('${e.id}','${e.type}')">✕</button>
            </div>
        </div></div>`).join('');
}

function showM(type){
    const mc = document.getElementById('mc');
    if(type === 'add'){
        AF.type='exp';
        renderAddModal();
    } else if(type === 'settings') {
        mc.innerHTML = `
            <div class="mtitle">每日限額設定</div>
            <input type="number" id="nbud" class="fi" value="${S.budget}">
            <button class="sub" style="background:var(--m-green)" onclick="S.budget=parseFloat(document.getElementById('nbud').value);save();closeM();render();">儲存設定</button>
        `;
    }
    document.getElementById('mo').style.display = 'flex';
}

function renderAddModal(){
    document.getElementById('mc').innerHTML = `
        <div style="display:flex;background:var(--surf);border-radius:var(--r);padding:4px;margin-bottom:15px">
            <button style="flex:1;padding:8px;border:none;border-radius:10px;background:${AF.type==='exp'?'#fff':'transparent'}" onclick="AF.type='exp';renderAddModal()">支出</button>
            <button style="flex:1;padding:8px;border:none;border-radius:10px;background:${AF.type==='inc'?'#fff':'transparent'}" onclick="AF.type='inc';renderAddModal()">收入</button>
        </div>
        <input type="number" id="mamt" class="fi" placeholder="輸入金額" inputmode="decimal">
        <input type="text" id="mdesc" class="fi" placeholder="描述(選填)">
        <div class="sl">選擇分類</div>
        <div style="margin-bottom:15px">${S.categories.map(c => `<span class="cat-tag ${AF.cat===c?'on':''}" onclick="AF.cat='${c}';renderAddModal()">${c}</span>`).join('')}</div>
        <button class="sub" style="background:${AF.type==='exp'?'var(--maple)':'var(--m-green)'}" onclick="subAdd()">完成記帳</button>
    `;
}

function subAdd(){
    const amt = parseFloat(document.getElementById('mamt').value); if(!amt) return;
    const item = { id: Date.now().toString(36), date: Date.now(), amount: amt, desc: document.getElementById('mdesc').value, cat: AF.cat };
    if(AF.type==='exp') S.expenses.push(item); else S.incomes.push(item);
    save(); closeM(); render();
}

function delItem(id, type){
    if(type==='exp') S.expenses = S.expenses.filter(e=>e.id!==id);
    else S.incomes = S.incomes.filter(i=>i.id!==id);
    save(); render();
}

function setTab(t, btn, c){
    tab = t; curC = c;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('fab').style.background = FABCOL[c];
    render();
}
function closeM(){ document.getElementById('mo').style.display='none'; }
function closeOnBg(e){ if(e.target.id==='mo') closeM(); }
load();
</script>
</body>
</html>
