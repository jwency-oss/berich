<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Berich</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#F4F1EE;--surf:#EBE8E4;--card:#FAF9F7;
          /* 莫蘭迪復古色系 */
          --v-green:#768A7E;   /* 復古綠 */
          --d-blue:#5D6D7E;    /* 深灰藍 */
          --s-green:#A3B18A;   /* 灰豆綠 */
          --b-purple:#9B8EB8;  /* 布洛克紫 */
          
          --maple:#B85550;--maple-d:#8A3530;--maple-l:#CC7A74;
          --text:#3A2E2C;--textm:#62504C;--textl:#9A9298;
          --bdr:rgba(140,115,110,0.15);--r:14px;--accent:var(--v-green);
        }
        body{background:var(--bg);color:var(--textm);font-family:-apple-system,'PingFang TC',sans-serif;user-select:none}
        .pnum{font-family:Impact,sans-serif !important}
        
        /* 頁籤顏色動態切換 */
        .tab{flex:1;padding:12px 0;background:none;border:none;border-bottom:3px solid transparent;font-size:14px;color:var(--textl);cursor:pointer;transition:all .3s}
        .tab.on{font-weight:700}
        .tab[data-t="today"].on{color:var(--v-green);border-bottom-color:var(--v-green)}
        .tab[data-t="cards"].on{color:var(--d-blue);border-bottom-color:var(--d-blue)}
        .tab[data-t="petty"].on{color:var(--s-green);border-bottom-color:var(--s-green)}
        .tab[data-t="fund"].on{color:var(--b-purple);border-bottom-color:var(--b-purple)}

        .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
        .sc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px}
        .sl{font-size:11px;color:var(--textl);margin-bottom:4px}
        .sv{font-size:20px;font-weight:600}
        
        /* 圖表條樣式 */
        .chart-box{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:12px}
        .chart-bar-container{height:10px;background:var(--surf);border-radius:5px;display:flex;overflow:hidden;margin:10px 0}
        .chart-segment{height:100%;transition:width 0.5s ease}
        .chart-legend{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--textl)}
        .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

        .ei{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;margin-bottom:8px}
        .eirow{display:flex;align-items:center;gap:10px}
        .eico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .en{flex:1;min-width:0}
        .ename{font-size:14px;font-weight:600;color:var(--text)}
        .emeta{font-size:11px;color:var(--textl);margin-top:3px}
        
        /* 彈窗樣式 */
        .fi{width:100%;padding:12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-size:15px;margin-bottom:12px;outline:none}
        .mbtns{display:flex;gap:8px;margin-bottom:15px}
        .mb{flex:1;padding:10px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);font-size:13px;cursor:pointer}
        .mb.on{color:#fff;border-color:transparent}
        .sub{width:100%;padding:14px;color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:600;cursor:pointer}
        
        .cat-tag{padding:6px 12px;border-radius:20px;font-size:12px;background:var(--surf);margin-right:5px;margin-bottom:5px;display:inline-block;cursor:pointer;border:1px solid transparent}
        .cat-tag.on{background:var(--accent);color:#fff}
    </style>
</head>
<body>

<div id="W" style="height:100vh;max-width:420px;margin:0 auto;position:relative;background:var(--bg);overflow:hidden">
    <div id="scroll" style="height:100%;overflow-y:auto;padding-bottom:100px">
        
        <div style="display:flex;flex-direction:column;align-items:center;padding:25px 16px 15px">
            <button onclick="showM('settings')" style="position:absolute;top:16px;right:16px;background:var(--surf);border:none;width:32px;height:32px;border-radius:50%">⚙</button>
            <div style="position:relative;width:160px;height:160px">
                <svg viewBox="0 0 160 160" style="transform:rotate(-90deg)">
                    <circle cx="80" cy="80" r="70" fill="none" stroke="var(--surf)" stroke-width="10"/>
                    <circle id="prog-ring" cx="80" cy="80" r="70" fill="none" stroke="var(--maple)" stroke-width="10" stroke-dasharray="440" stroke-dashoffset="0" stroke-linecap="round" style="transition:0.5s"/>
                </svg>
                <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
                    <span style="font-size:11px;color:var(--maple);font-weight:700">今日剩餘</span>
                    <span id="hamt" class="pnum" style="font-size:36px;color:var(--text)">$0</span>
                </div>
            </div>
            <div id="fund-ball" style="margin-top:-20px;width:70px;height:70px;border-radius:50%;background:var(--b-purple);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 12px rgba(155,142,184,0.3)">
                <span style="font-size:9px">私房錢</span>
                <span id="fund-disp" class="pnum" style="font-size:16px">$0</span>
            </div>
        </div>

        <div style="display:flex;padding:0 16px;border-bottom:1px solid var(--bdr)">
            <button class="tab on" data-t="today" onclick="setTab('today',this)">今日記帳</button>
            <button class="tab" data-t="cards" onclick="setTab('cards',this)">信用卡</button>
            <button class="tab" data-t="petty" onclick="setTab('petty',this)">零用金</button>
            <button class="tab" data-t="fund" onclick="setTab('fund',this)">私房錢</button>
        </div>

        <div id="body" style="padding:16px"></div>
    </div>

    <button id="fab" onclick="showM('add')" style="position:absolute;bottom:25px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;border:none;background:var(--v-green);color:#fff;font-size:28px;box-shadow:0 4px 15px rgba(0,0,0,0.1)">+</button>

    <div id="mo" onclick="closeOnBg(event)" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end">
        <div style="background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:20px;max-height:85%;overflow-y:auto">
            <div id="mc"></div>
        </div>
    </div>
</div>

<script>
const S = {
    budget: 1000,
    expenses: [],
    incomes: [],
    categories: ['飲食','投資','保險','追星','寵物','交通','機車','交際','公司'],
    cards: [],
    petty: {budget: 5000, items: []},
    fund: {balance: 0, txs: []}
};

const COLORS = {
    'today': '#768A7E',
    'cards': '#5D6D7E',
    'petty': '#A3B18A',
    'fund': '#9B8EB8'
};

const CAT_COLORS = ['#768A7E', '#5D6D7E', '#A3B18A', '#9B8EB8', '#B85550', '#C9A85C', '#7A9CB2', '#D4A373', '#CCD5AE'];

let currentTab = 'today';
let formType = 'exp'; // exp or inc
let selCat = '飲食';

async function load() {
    const d = localStorage.getItem('berich_data');
    if(d) Object.assign(S, JSON.parse(d));
    render();
}
function save() { localStorage.setItem('berich_data', JSON.stringify(S)); }

function render() {
    const today = new Date().toDateString();
    const tExp = S.expenses.filter(e => new Date(e.date).toDateString() === today).reduce((a,b)=>a+b.amount, 0);
    const tInc = S.incomes.filter(i => new Date(i.date).toDateString() === today).reduce((a,b)=>a+b.amount, 0);
    
    const rem = S.budget - tExp;
    document.getElementById('hamt').innerText = '$' + rem.toLocaleString();
    document.getElementById('fund-disp').innerText = '$' + S.fund.balance.toLocaleString();
    
    const offset = 440 - (Math.max(0, rem) / S.budget) * 440;
    document.getElementById('prog-ring').style.strokeDashoffset = offset;
    
    renderBody(tExp, tInc);
}

function renderBody(tExp, tInc) {
    const el = document.getElementById('body');
    if(currentTab === 'today') {
        el.innerHTML = `
            <div class="row2">
                <div class="sc"><div class="sl">今日支出</div><div class="sv" style="color:var(--maple)">$${tExp.toLocaleString()}</div></div>
                <div class="sc"><div class="sl">今日收入</div><div class="sv" style="color:var(--v-green)">$${tInc.toLocaleString()}</div></div>
            </div>
            
            <div class="chart-box">
                <div class="sl">支出類別占比</div>
                ${renderChart()}
            </div>

            <div class="sl">今日明細</div>
            ${renderList()}
        `;
    } else {
        el.innerHTML = `<div style="text-align:center;color:var(--textl);padding:40px">此區塊維修中，功能正常運作</div>`;
    }
}

function renderChart() {
    const today = new Date().toDateString();
    const dayExps = S.expenses.filter(e => new Date(e.date).toDateString() === today);
    if(dayExps.length === 0) return `<div style="font-size:12px;color:var(--textl);margin:10px 0">尚無支出資料</div>`;

    const totals = {};
    dayExps.forEach(e => totals[e.cat] = (totals[e.cat] || 0) + e.amount);
    const totalAll = dayExps.reduce((a,b)=>a+b.amount, 0);

    let bars = '', legends = '';
    Object.keys(totals).forEach((cat, i) => {
        const p = (totals[cat] / totalAll * 100).toFixed(1);
        const col = CAT_COLORS[i % CAT_COLORS.length];
        bars += `<div class="chart-segment" style="width:${p}%; background:${col}"></div>`;
        legends += `<span><i class="dot" style="background:${col}"></i>${cat} ${p}%</span>`;
    });

    return `<div class="chart-bar-container">${bars}</div><div class="chart-legend">${legends}</div>`;
}

function renderList() {
    const today = new Date().toDateString();
    const items = [
        ...S.expenses.filter(e => new Date(e.date).toDateString() === today).map(e => ({...e, type:'exp'})),
        ...S.incomes.filter(i => new Date(i.date).toDateString() === today).map(i => ({...i, type:'inc'}))
    ].sort((a,b) => b.date - a.date);

    if(!items.length) return `<div style="text-align:center;padding:20px;color:var(--textl)">還沒有紀錄喔</div>`;

    return items.map(item => `
        <div class="ei">
            <div class="eirow">
                <div class="eico" style="background:var(--surf)">${item.type === 'exp' ? '💸' : '💰'}</div>
                <div class="en">
                    <div class="ename">${item.desc || item.cat}</div>
                    <div class="emeta">${item.cat} · ${new Date(item.date).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                </div>
                <div style="text-align:right">
                    <div style="font-weight:700; color:${item.type === 'exp' ? 'var(--maple)' : 'var(--v-green)'}">
                        ${item.type === 'exp' ? '-' : '+'}$${item.amount}
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function showM(type) {
    const mc = document.getElementById('mc');
    if(type === 'add') {
        mc.innerHTML = `
            <div style="display:flex; justify-content:center; margin-bottom:20px">
                <button class="mb ${formType==='exp'?'on':''}" style="background:${formType==='exp'?'var(--maple)':'var(--surf)'}" onclick="formType='exp';showM('add')">支出</button>
                <button class="mb ${formType==='inc'?'on':''}" style="background:${formType==='inc'?'var(--v-green)':'var(--surf)'}" onclick="formType='inc';showM('add')">收入</button>
            </div>
            <input type="number" id="m-amt" class="fi" placeholder="輸入金額" inputmode="decimal">
            <input type="text" id="m-desc" class="fi" placeholder="描述（選填）">
            <div class="sl">選擇分類</div>
            <div style="margin-bottom:15px">
                ${S.categories.map(c => `<span class="cat-tag ${selCat===c?'on':''}" onclick="selCat='${c}';showM('add')">${c}</span>`).join('')}
            </div>
            <button class="sub" style="background:${formType==='exp'?'var(--maple)':'var(--v-green)'}" onclick="addItem()">完成記帳</button>
        `;
    } else if(type === 'settings') {
        mc.innerHTML = `
            <div class="sl">管理分類</div>
            <input type="text" id="new-cat" class="fi" placeholder="新增分類名稱">
            <button class="mb" onclick="addCat()" style="width:100%; margin-bottom:20px">新增分類</button>
            <div class="sl">每日限額</div>
            <input type="number" id="new-bud" class="fi" value="${S.budget}">
            <button class="sub" style="background:var(--d-blue)" onclick="saveSet()">儲存設定</button>
        `;
    }
    document.getElementById('mo').style.display = 'flex';
}

function addItem() {
    const amt = parseFloat(document.getElementById('m-amt').value);
    const desc = document.getElementById('m-desc').value;
    if(!amt) return;
    const item = { date: Date.now(), amount: amt, desc, cat: selCat };
    if(formType === 'exp') S.expenses.push(item);
    else S.incomes.push(item);
    save(); closeM(); render();
}

function addCat() {
    const val = document.getElementById('new-cat').value;
    if(val && !S.categories.includes(val)) S.categories.push(val);
    save(); showM('settings');
}

function saveSet() {
    S.budget = parseFloat(document.getElementById('new-bud').value) || S.budget;
    save(); closeM(); render();
}

function setTab(t, btn) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('fab').style.background = COLORS[t];
    render();
}

function closeM() { document.getElementById('mo').style.display = 'none'; }
function closeOnBg(e) { if(e.target.id === 'mo') closeM(); }

load();
</script>
</body>
</html>
