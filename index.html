<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Berich</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        /* 你的樣式表 */
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#F4EBE8;--surf:#EBE0DC;--card:#FAF5F2;
          --maple:#B85550;--maple-d:#8A3530;--maple-l:#CC7A74;--maple-ll:#F0D8D5;--maple-lll:#FAF1EF;
          --yellow:#C9A85C;--yellow-l:#EAD9A8;--yellow-ll:#FDF6E4;
          --blue:#7A9CB2;--blue-l:#AECAD8;--blue-ll:#E4F0F5;
          --purple:#9B8EB8;--purple-l:#C4B8D8;--purple-ll:#EDE9F5;
          --red:#C47A7A;--red-l:#DFB0B0;--red-ll:#F7EAEA;
          --text:#3A2E2C;--textm:#62504C;--textl:#9A9298;
          --bdr:rgba(140,115,110,0.2);--r:13px;--rl:20px;--accent:var(--maple);
        }
        body{background:var(--bg);color:var(--textm);font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif}
        .pnum{font-family:Impact,'Arial Narrow','Arial Black',sans-serif !important}
        .tab{flex:1;padding:9px 0;background:none;border:none;border-bottom:2.5px solid transparent;font-size:13px;color:var(--textl);cursor:pointer;font-family:inherit;transition:all .2s}
        .tab.on{font-weight:500}
        .tab[data-c="y"].on{color:var(--yellow);border-bottom-color:var(--yellow)}
        .tab[data-c="b"].on{color:var(--blue);border-bottom-color:var(--blue)}
        .tab[data-c="p"].on{color:var(--purple);border-bottom-color:var(--purple)}
        .tab[data-c="r"].on{color:var(--red);border-bottom-color:var(--red)}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
        .sc{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:11px 13px}
        .sl{font-size:11px;color:var(--textl);margin-bottom:3px}
        .sv{font-size:21px;font-weight:500}
        .sec{font-size:11px;color:var(--textl);letter-spacing:.5px;margin:12px 0 7px}
        .ei{display:flex;flex-direction:column;background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
        .eirow{display:flex;align-items:center;gap:9px}
        .eico{width:35px;height:35px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
        .en{flex:1;min-width:0}
        .ename{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .emeta{font-size:11px;color:var(--textl);margin-top:2px}
        .db{background:none;border:none;color:var(--textl);cursor:pointer;font-size:13px;padding:2px 5px;opacity:.5}
        .db:hover{opacity:1;color:var(--red)}
        .cc{border-radius:18px;padding:18px 20px;margin-bottom:10px;color:#fff;min-height:128px}
        .ab{width:100%;padding:10px;background:none;border:1px dashed var(--bdr);border-radius:var(--r);color:var(--textl);font-size:13px;cursor:pointer;font-family:inherit;margin-top:5px;transition:all .15s}
        .ab:hover{border-color:var(--accent);color:var(--accent)}
        .empty{text-align:center;padding:28px 0;color:var(--textl);font-size:13px;line-height:1.8}
        .fg{margin-bottom:12px}
        .fl{font-size:12px;color:var(--textl);display:block;margin-bottom:5px}
        .fi{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
        .fi:focus{border-color:var(--accent)}
        .mtitle{font-size:16px;font-weight:500;color:var(--text);text-align:center;margin-bottom:16px}
        .mbtns{display:flex;gap:7px}
        .mb{flex:1;padding:8px 4px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--textm);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
        .mb.on{color:#fff;border-color:transparent}
        .sub{width:100%;padding:12px;color:#fff;border:none;border-radius:var(--r);font-size:15px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:10px}
        .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;vertical-align:middle}
        .cdiv{height:.5px;background:var(--bdr);margin:4px 0 16px}
        .togbtn{border-radius:20px;padding:4px 14px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid;transition:all .15s}
    </style>
</head>
<body>

<div id="W" style="height:100vh;overflow:hidden;position:relative;max-width:420px;margin:0 auto;background:var(--bg)">
  <div id="scroll" style="height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:84px">

    <div style="display:flex;flex-direction:column;align-items:center;padding:18px 16px 6px;position:relative">
      <button onclick="showM('settings')" style="position:absolute;top:16px;right:16px;background:var(--maple-ll);border:1px solid var(--maple-l);color:var(--maple-d);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">⚙</button>

      <div style="display:flex;flex-direction:column;align-items:center">
        <div style="position:relative;width:162px;height:162px">
          <svg style="position:absolute;inset:0" viewBox="0 0 162 162" xmlns="http://www.w3.org/2000/svg">
            <circle cx="81" cy="81" r="78" fill="white" stroke="var(--maple-ll)" stroke-width="1.5"/>
            <circle cx="81" cy="81" r="69" fill="none" stroke="#EDD0CC" stroke-width="9"/>
            <circle id="prog-ring" cx="81" cy="81" r="69" fill="none" stroke="var(--maple)" stroke-width="9"
              stroke-dasharray="433" stroke-dashoffset="0" stroke-linecap="round"
              transform="rotate(-90 81 81)" style="transition:stroke-dashoffset .75s cubic-bezier(.4,0,.2,1)"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px">
            <div style="font-size:10px;color:var(--maple);letter-spacing:1.8px;font-weight:700">今日剩餘</div>
            <div id="hamt" class="pnum" style="font-size:38px;color:var(--maple-d);letter-spacing:-2px;line-height:1">$1,000</div>
            <div id="hspent" style="font-size:10px;color:var(--maple-l);font-weight:500;letter-spacing:.3px">已花 $0</div>
          </div>
        </div>
        <div style="width:10px;background:linear-gradient(var(--maple),var(--maple-l));height:18px;border-radius:0 0 5px 5px;margin-top:-1px;position:relative;z-index:1"></div>
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(150deg,var(--maple-l),var(--maple));display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-1px;box-shadow:0 5px 16px rgba(184,85,80,.28)">
          <div style="font-size:9px;color:rgba(255,255,255,.85);letter-spacing:1px;font-weight:700;margin-bottom:1px">私房錢</div>
          <div id="fund-disp" class="pnum" style="font-size:18px;color:#fff;letter-spacing:-0.5px;line-height:1.1">$0</div>
        </div>
      </div>
      <div id="hsub" style="font-size:11px;color:var(--textl);text-align:center;margin-top:10px">每日限額 $1,000 · 今日已花 $0</div>
    </div>

    <div style="display:flex;padding:10px 16px 0;gap:4px">
      <button class="tab on" data-c="y" onclick="setTab('today',this,'y')">今日記帳</button>
      <button class="tab" data-c="b" onclick="setTab('cards',this,'b')">信用卡</button>
      <button class="tab" data-c="p" onclick="setTab('petty',this,'p')">零用金</button>
      <button class="tab" data-c="r" onclick="setTab('fund',this,'r')">私房錢</button>
    </div>

    <div id="body" style="padding:14px 16px 0"></div>
  </div>

  <button id="fab" onclick="showM('add')" style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:var(--maple);color:#fff;width:52px;height:52px;border-radius:50%;border:none;font-size:26px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 16px rgba(184,85,80,.4)">+</button>

  <div id="mo" onclick="closeOnBg(event)" style="display:none;position:absolute;inset:0;background:rgba(38,28,26,.3);z-index:20;align-items:flex-end">
    <div style="background:var(--card);border-radius:22px 22px 0 0;padding:14px 18px 32px;width:100%;max-height:90%;overflow-y:auto">
      <div style="width:34px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 14px"></div>
      <div id="mc"></div>
    </div>
  </div>
</div>

<script>
const S={budget:1000,expenses:[],cards:[],petty:{budget:5000,items:[]},fund:{balance:0,txs:[]}};
const AF={method:'現金',cardId:null,inst:false,periods:12,_a:'',_d:''};
let tab='today',curC='y';

async function load(){
  for(const k of['budget','expenses','cards','petty','fund']){
    try{const r=await window.storage.get(k);if(r){const v=JSON.parse(r.value);if(k==='budget')S.budget=v;else S[k]=v;}}catch(e){}
  }render();
}
async function save(){
  for(const k of['budget','expenses','cards','petty','fund']){
    try{await window.storage.set(k,JSON.stringify(k==='budget'?S.budget:S[k]));}catch(e){}
  }
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmt(n){return'$'+Math.round(n).toLocaleString('zh-TW')}
function todays(){return S.expenses.filter(e=>new Date(e.date).toDateString()===new Date().toDateString())}
function todayT(){return todays().reduce((s,e)=>s+e.amount,0)}
function curPer(d,t){return Math.min(t,Math.max(1,Math.floor((Date.now()-d)/(1000*60*60*24*30))+1))}

const FABCOL={y:'#C9A85C',b:'#7A9CB2',p:'#9B8EB8',r:'#C47A7A'};
const CC_BG=['linear-gradient(140deg,#7A9CB2,#5882A0)','linear-gradient(140deg,#9B8EB8,#7A70A8)','linear-gradient(140deg,#C47A7A,#A86060)','linear-gradient(140deg,#C9A85C,#B09040)'];

function setAccent(c){
  curC=c;
  const fab=document.getElementById('fab');
  fab.style.background=FABCOL[c];fab.style.boxShadow='0 3px 14px '+FABCOL[c]+'55';
  const m={y:['--yellow','--yellow-l','--yellow-ll'],b:['--blue','--blue-l','--blue-ll'],p:['--purple','--purple-l','--purple-ll'],r:['--red','--red-l','--red-ll']};
  const rt=document.documentElement;
  rt.style.setProperty('--accent','var('+m[c][0]+')');rt.style.setProperty('--accent-l','var('+m[c][1]+')');rt.style.setProperty('--accent-ll','var('+m[c][2]+')');
}

function render(){
  const tot=todayT(),rem=S.budget-tot,pct=Math.max(0,Math.min(100,rem/S.budget*100));
  document.getElementById('hamt').textContent=fmt(Math.max(0,rem));
  document.getElementById('hspent').textContent='已花 '+fmt(tot);
  document.getElementById('hsub').textContent='每日限額 '+fmt(S.budget)+' · 今日已花 '+fmt(tot);
  document.getElementById('fund-disp').textContent=fmt(S.fund.balance);
  const ring=document.getElementById('prog-ring');
  if(ring)ring.setAttribute('stroke-dashoffset',Math.round(433*(1-pct/100)));
  setAccent(curC);renderB();
}
function renderB(){
  const el=document.getElementById('body');
  if(tab==='today')el.innerHTML=rToday();
  else if(tab==='cards')el.innerHTML=rCards();
  else if(tab==='petty')el.innerHTML=rPetty();
  else el.innerHTML=rFund();
}
function setTab(t,btn,c){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');setAccent(c);renderB();}

function rToday(){
  const exps=[...todays()].reverse();
  const cashT=exps.filter(e=>e.method==='現金').reduce((s,e)=>s+e.amount,0);
  const cardT=exps.filter(e=>e.method==='刷卡').reduce((s,e)=>s+e.amount,0);
  const compT=exps.filter(e=>e.method==='公司').reduce((s,e)=>s+e.amount,0);
  return`<div class="row2">
    <div class="sc" style="border-left:3px solid var(--yellow)"><div class="sl">今日花費</div><div class="sv" style="color:var(--yellow)">${fmt(todayT())}</div></div>
    <div class="sc" style="border-left:3px solid var(--textl)"><div class="sl">交易筆數</div><div class="sv">${exps.length} 筆</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:13px">
    <div style="background:var(--yellow-ll);border-radius:var(--r);padding:9px 10px;border:.5px solid var(--yellow-l)"><div style="font-size:10px;color:var(--yellow);margin-bottom:2px">💵 現金</div><div style="font-size:14px;font-weight:500;color:var(--text)">${fmt(cashT)}</div></div>
    <div style="background:var(--blue-ll);border-radius:var(--r);padding:9px 10px;border:.5px solid var(--blue-l)"><div style="font-size:10px;color:var(--blue);margin-bottom:2px">💳 刷卡</div><div style="font-size:14px;font-weight:500;color:var(--text)">${fmt(cardT)}</div></div>
    <div style="background:var(--purple-ll);border-radius:var(--r);padding:9px 10px;border:.5px solid var(--purple-l)"><div style="font-size:10px;color:var(--purple);margin-bottom:2px">🏢 公司</div><div style="font-size:14px;font-weight:500;color:var(--text)">${fmt(compT)}</div></div>
  </div>
  <div class="sec">今日明細</div>
  ${exps.length===0?'<div class="empty">今天還沒有花費紀錄<br>點下方 ＋ 開始記帳</div>':
    exps.map(e=>{
      const col=e.method==='現金'?'var(--yellow)':e.method==='刷卡'?'var(--blue)':'var(--purple)';
      const bg=e.method==='現金'?'var(--yellow-ll)':e.method==='刷卡'?'var(--blue-ll)':'var(--purple-ll)';
      const ico=e.method==='現金'?'💵':e.method==='刷卡'?'💳':'🏢';
      const t=new Date(e.date).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
      const card=e.cardId?S.cards.find(c=>c.id===e.cardId):null;
      const parts=[];
      if(card)parts.push(`<span class="tag" style="background:var(--blue-ll);color:var(--blue)">${card.name}</span>`);
      if(e.installment?.enabled)parts.push(`<span class="tag" style="background:var(--purple-ll);color:var(--purple)">${curPer(e.date,e.installment.periods)}/${e.installment.periods}期</span>`);
      return`<div class="ei"><div class="eirow">
        <div class="eico" style="background:${bg}">${ico}</div>
        <div class="en">
          <div class="ename">${e.desc||'消費'}</div>
          <div class="emeta">${parts.length?parts.join(' ')+'<span style="color:var(--textl)"> · </span>':''}<span style="color:${col};font-weight:500">${e.method}</span> · ${t}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:15px;font-weight:500;color:${col}">-${fmt(e.amount)}</div>
          <button class="db" onclick="delExp('${e.id}')">✕</button>
        </div>
      </div></div>`;
    }).join('')}`;
}

function rCards(){
  let html='';
  if(!S.cards.length)html='<div class="empty">還沒有信用卡<br>點下方新增</div>';
  else S.cards.forEach((card,i)=>{
    const exps=S.expenses.filter(e=>e.cardId===card.id).reverse();
    const total=exps.reduce((s,e)=>s+e.amount,0);
    const instMo=exps.reduce((s,e)=>{if(e.installment?.enabled){const cp=curPer(e.date,e.installment.periods);return cp<e.installment.periods?s+e.installment.monthlyAmount:s;}return s;},0);
    html+=`<div class="cc" style="background:${CC_BG[i%CC_BG.length]}">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div><div style="font-size:15px;font-weight:500;margin-bottom:3px">${card.name}</div><div style="font-size:12px;opacity:.72;letter-spacing:2px;margin-bottom:14px">**** ${card.last4}</div></div>
        <button onclick="delCard('${card.id}')" style="background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:11px">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <div><div style="font-size:10px;opacity:.62;margin-bottom:2px">消費截止</div><div style="font-size:12px;font-weight:500">每月 ${card.billingCycle} 日</div></div>
        <div><div style="font-size:10px;opacity:.62;margin-bottom:2px">結帳日</div><div style="font-size:12px;font-weight:500">每月 ${card.statementDate} 日</div></div>
        <div><div style="font-size:10px;opacity:.62;margin-bottom:2px">繳費日</div><div style="font-size:12px;font-weight:500">每月 ${card.dueDate} 日</div></div>
      </div>
    </div>`;
    if(exps.length){
      html+=`<div class="row2"><div class="sc" style="border-top:2.5px solid var(--blue)"><div class="sl">累計消費</div><div class="sv" style="color:var(--blue)">${fmt(total)}</div></div><div class="sc" style="border-top:2.5px solid var(--purple)"><div class="sl">分期每月合計</div><div class="sv" style="color:var(--purple)">${instMo>0?fmt(instMo):'—'}</div></div></div>`;
      exps.forEach(e=>{
        const d=new Date(e.date).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
        let ib='';
        if(e.installment?.enabled){const cp=curPer(e.date,e.installment.periods),done=cp>=e.installment.periods,pct2=Math.min(100,Math.round(cp/e.installment.periods*100));
          ib=`<div style="margin-top:8px;padding-top:8px;border-top:.5px solid var(--bdr)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span class="tag" style="background:${done?'var(--yellow-ll)':'var(--blue-ll)'};color:${done?'var(--yellow)':'var(--blue)'}">${done?'✓ 已付清':'第 '+cp+' / '+e.installment.periods+' 期'}</span><span style="font-size:11px;color:var(--textl)">每期 ${fmt(e.installment.monthlyAmount)}</span></div><div style="background:var(--surf);height:5px;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;background:${done?'var(--yellow)':'var(--blue)'};width:${pct2}%"></div></div></div>`;
        }
        html+=`<div class="ei"><div class="eirow"><div class="eico" style="background:var(--blue-ll)">💳</div><div class="en"><div class="ename">${e.desc||'刷卡消費'}</div><div class="emeta">${d}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:15px;font-weight:500;color:var(--blue)">-${fmt(e.amount)}</div><button class="db" onclick="delExp('${e.id}')">✕</button></div></div>${ib}</div>`;
      });
    } else html+=`<div style="font-size:13px;color:var(--textl);text-align:center;padding:10px 0 12px">還沒有消費紀錄</div>`;
    if(i<S.cards.length-1)html+=`<div class="cdiv"></div>`;
  });
  html+=`<button class="ab" onclick="showM('addCard')">＋ 新增信用卡</button>`;
  return html;
}

function rPetty(){
  const tot=S.petty.items.reduce((s,e)=>s+e.amount,0),rem=S.petty.budget-tot;
  const pct=Math.max(0,Math.min(100,tot/S.petty.budget*100));
  return`<div class="sc" style="margin-bottom:13px;border-left:3px solid var(--purple)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div class="sl">零用金餘額</div><div class="sv" style="color:var(--purple)">${fmt(rem)}</div></div><div style="text-align:right"><div class="sl">已使用</div><div class="sv" style="color:var(--red)">${fmt(tot)}</div></div></div><div style="background:var(--surf);height:6px;border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--purple);width:${pct}%"></div></div></div>
  <div style="display:flex;gap:7px;margin-bottom:12px"><button class="ab" style="margin:0;flex:1" onclick="showM('addPetty')">＋ 新增花費</button><button class="ab" style="margin:0;flex:1" onclick="showM('setPetty')">設定額度</button></div>
  <div class="sec">零用金明細</div>
  ${!S.petty.items.length?'<div class="empty">還沒有零用金記錄</div>':
    [...S.petty.items].reverse().map(e=>{const d=new Date(e.date).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
      return`<div class="ei"><div class="eirow"><div class="eico" style="background:var(--purple-ll)">🏢</div><div class="en"><div class="ename">${e.desc||'零用金花費'}</div><div class="emeta">${d}</div></div><div style="text-align:right"><div style="font-size:15px;font-weight:500;color:var(--purple)">-${fmt(e.amount)}</div><button class="db" onclick="delPetty('${e.id}')">✕</button></div></div></div>`;
    }).join('')}`;
}

function rFund(){
  return`<div style="background:linear-gradient(145deg,var(--maple-l),var(--maple));border-radius:18px;padding:22px;color:#fff;text-align:center;margin-bottom:12px"><div style="font-size:12px;opacity:.75;margin-bottom:5px">私房錢餘額</div><div class="pnum" style="font-size:40px;color:#fff;letter-spacing:-1.5px;line-height:1.1">${fmt(S.fund.balance)}</div></div>
  <div style="display:flex;gap:7px;margin-bottom:12px"><button class="ab" style="margin:0;flex:1" onclick="showM('fundIn')">＋ 存入</button><button class="ab" style="margin:0;flex:1" onclick="showM('fundOut')">－ 取出</button></div>
  <div class="sec">交易紀錄</div>
  ${!S.fund.txs.length?'<div class="empty">還沒有交易紀錄</div>':
    [...S.fund.txs].reverse().map(tx=>{const d=new Date(tx.date).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}),isIn=tx.type==='in';
      return`<div class="ei"><div class="eirow"><div class="eico" style="background:${isIn?'var(--maple-lll)':'var(--red-ll)'}">${isIn?'💰':'💸'}</div><div class="en"><div class="ename">${tx.desc||(isIn?'存入':'取出')}</div><div class="emeta">${d}</div></div><div style="text-align:right"><div style="font-size:15px;font-weight:500;color:${isIn?'var(--maple)':'var(--red)'};">${isIn?'+':'-'}${fmt(tx.amount)}</div><button class="db" onclick="delFundTx('${tx.id}','${tx.type}',${tx.amount})">✕</button></div></div></div>`;
    }).join('')}`;
}

function updateInstPreview(){
  const a=document.getElementById('mamt'),p=document.getElementById('mperd'),pv=document.getElementById('inst-preview');
  if(!p||!pv)return;
  const per=parseInt(p.value)||0;AF.periods=per;
  document.querySelectorAll('.qper').forEach(b=>{const on=parseInt(b.dataset.p)===per;b.classList.toggle('on',on);b.style.background=on?'var(--blue)':'';b.style.color=on?'#fff':'';b.style.borderColor=on?'transparent':'';});
  const amt=parseFloat(a?.value)||0;
  if(amt>0&&per>0){const mo=Math.ceil(amt/per);pv.style.display='block';pv.innerHTML='每期約 <span style="color:var(--blue);font-weight:500">'+fmt(mo)+'</span> · 共 '+per+' 期 · 總計 '+fmt(mo*per);}
  else pv.style.display='none';
}
function setQuickPer(p){AF.periods=p;const el=document.getElementById('mperd');if(el)el.value=p;updateInstPreview();}

function renderAddModal(){
  const a=document.getElementById('mamt'),d=document.getElementById('mdesc');
  if(a)AF._a=a.value;if(d)AF._d=d.value;
  const mc=document.getElementById('mc'),acc=FABCOL[curC];
  const MCOLS={現金:'var(--yellow)',刷卡:'var(--blue)',公司:'var(--purple)'};
  const MICOS={現金:'💵',刷卡:'💳',公司:'🏢'};
  const amtV=parseFloat(AF._a)||0,mo=AF.inst&&AF.periods>0&&amtV>0?Math.ceil(amtV/AF.periods):0;

  let html=`<div class="mtitle">新增花費</div>
    <div class="fg"><label class="fl">金額</label><input class="fi" id="mamt" type="number" placeholder="0" inputmode="decimal" value="${AF._a}" oninput="updateInstPreview()"></div>
    <div class="fg"><label class="fl">描述（可略）</label><input class="fi" id="mdesc" placeholder="咖啡、午餐、計程車..." value="${AF._d}"></div>
    <div class="fg"><label class="fl">付款方式</label><div class="mbtns">
      ${['現金','刷卡','公司'].map(m=>{const on=AF.method===m;return`<button class="mb${on?' on':''}" style="${on?'background:'+MCOLS[m]+';color:#fff;border-color:transparent':''}" onclick="AF.method='${m}';renderAddModal()">${MICOS[m]} ${m}</button>`;}).join('')}
    </div></div>`;

  if(AF.method==='刷卡'){
    html+=`<div class="fg"><label class="fl" style="color:var(--blue)">選擇信用卡</label>`;
    if(!S.cards.length)html+=`<div style="font-size:12px;color:var(--textl);padding:8px 10px;background:var(--blue-ll);border-radius:var(--r);text-align:center">請先在信用卡頁籤新增卡片</div>`;
    else{html+=`<div style="display:flex;flex-wrap:wrap;gap:6px">`;S.cards.forEach(c=>{const on=AF.cardId===c.id;html+=`<button class="mb${on?' on':''}" style="${on?'background:var(--blue);color:#fff;border-color:transparent':''};flex:none;padding:8px 14px;font-size:12px" onclick="AF.cardId='${c.id}';renderAddModal()">${c.name}</button>`;});html+=`</div>`;}
    html+=`</div>`;
    html+=`<div class="fg"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${AF.inst?'11':'0'}px"><label class="fl" style="margin:0">分期付款</label><button class="togbtn" onclick="AF.inst=!AF.inst;renderAddModal()" style="background:${AF.inst?'var(--blue)':'transparent'};border-color:${AF.inst?'var(--blue)':'var(--bdr)'};color:${AF.inst?'#fff':'var(--textl)'}">${AF.inst?'✓ 已開啟':'關閉'}</button></div>`;
    if(AF.inst){
      html+=`<div style="display:flex;gap:6px;margin-bottom:8px">${[3,6,12,24].map(p=>{const on=AF.periods===p;return`<button class="mb qper${on?' on':''}" data-p="${p}" style="${on?'background:var(--blue);color:#fff;border-color:transparent':''};padding:7px 2px;font-size:12px" onclick="setQuickPer(${p})">${p}期</button>`;}).join('')}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:var(--textl);white-space:nowrap;flex-shrink:0">自訂期數</div><input class="fi" id="mperd" type="number" min="1" max="999" placeholder="期數" value="${AF.periods}" style="padding:8px 10px;font-size:14px;text-align:center" oninput="updateInstPreview()"><div style="font-size:13px;color:var(--textl);white-space:nowrap">期</div></div>
      <div id="inst-preview" style="font-size:12px;color:var(--textl);text-align:center;background:var(--blue-ll);padding:8px 12px;border-radius:var(--r);${mo>0?'':'display:none'}">${mo>0?'每期約 <span style="color:var(--blue);font-weight:500">'+fmt(mo)+'</span> · 共 '+AF.periods+' 期 · 總計 '+fmt(mo*AF.periods):''}</div>`;
    }
    html+=`</div>`;
  }
  html+=`<button class="sub" style="background:${acc}" onclick="subAdd()">記帳</button>`;
  mc.innerHTML=html;
}

function showM(type){
  const mc=document.getElementById('mc'),acc=FABCOL[curC];
  if(type==='add'){AF.method='現金';AF.cardId=null;AF.inst=false;AF.periods=12;AF._a='';AF._d='';renderAddModal();}
  else if(type==='settings')mc.innerHTML=`<div class="mtitle">每日限額設定</div><div class="fg"><label class="fl">每日花費上限（元）</label><input class="fi" id="mbudget" type="number" value="${S.budget}" inputmode="decimal"></div><button class="sub" style="background:var(--maple)" onclick="subBudget()">儲存</button>`;
  else if(type==='addCard')mc.innerHTML=`<div class="mtitle">新增信用卡</div><div class="fg"><label class="fl">卡片名稱</label><input class="fi" id="mcn" placeholder="台新玫瑰卡、國泰世華..."></div><div class="fg"><label class="fl">卡號後四碼</label><input class="fi" id="mcl4" placeholder="1234" maxlength="4" inputmode="numeric"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px"><div><label class="fl">消費截止日</label><input class="fi" id="mcb" type="number" min="1" max="31" placeholder="25" inputmode="numeric"></div><div><label class="fl">結帳日</label><input class="fi" id="mcs" type="number" min="1" max="31" placeholder="5" inputmode="numeric"></div><div><label class="fl">繳費日</label><input class="fi" id="mcd" type="number" min="1" max="31" placeholder="25" inputmode="numeric"></div></div><button class="sub" style="background:var(--blue)" onclick="subCard()">新增</button>`;
  else if(type==='addPetty')mc.innerHTML=`<div class="mtitle">新增零用金花費</div><div class="fg"><label class="fl">金額</label><input class="fi" id="mpa" type="number" placeholder="0" inputmode="decimal"></div><div class="fg"><label class="fl">描述（可略）</label><input class="fi" id="mpd" placeholder="描述..."></div><button class="sub" style="background:var(--purple)" onclick="subPetty()">記帳</button>`;
  else if(type==='setPetty')mc.innerHTML=`<div class="mtitle">設定零用金額度</div><div class="fg"><label class="fl">零用金總額（元）</label><input class="fi" id="mpb" type="number" value="${S.petty.budget}" inputmode="decimal"></div><button class="sub" style="background:var(--purple)" onclick="subPettyB()">儲存</button>`;
  else if(type==='fundIn')mc.innerHTML=`<div class="mtitle">存入私房錢</div><div class="fg"><label class="fl">金額</label><input class="fi" id="mfa" type="number" placeholder="0" inputmode="decimal"></div><div class="fg"><label class="fl">備註（可略）</label><input class="fi" id="mfd" placeholder="..."></div><button class="sub" style="background:var(--maple)" onclick="subFund('in')">存入</button>`;
  else if(type==='fundOut')mc.innerHTML=`<div class="mtitle">取出私房錢</div><div class="fg"><label class="fl">金額</label><input class="fi" id="mfa" type="number" placeholder="0" inputmode="decimal"></div><div class="fg"><label class="fl">備註（可略）</label><input class="fi" id="mfd" placeholder="..."></div><button class="sub" style="background:var(--maple-d)" onclick="subFund('out')">取出</button>`;
  document.getElementById('mo').style.display='flex';
  setTimeout(()=>{const fi=mc.querySelector('input');if(fi)fi.focus();},80);
}
function closeM(){document.getElementById('mo').style.display='none';}
function closeOnBg(e){if(e.target===document.getElementById('mo'))closeM();}

function subAdd(){
  const amt=parseFloat(document.getElementById('mamt').value);if(!amt||amt<=0)return;
  const desc=document.getElementById('mdesc').value;
  const exp={id:uid(),date:Date.now(),amount:amt,desc,method:AF.method};
  if(AF.method==='刷卡'){
    if(AF.cardId)exp.cardId=AF.cardId;
    if(AF.inst){const p=parseInt(document.getElementById('mperd')?.value)||AF.periods;exp.installment={enabled:true,periods:p,monthlyAmount:Math.ceil(amt/p)};}
  }
  S.expenses.push(exp);save();closeM();render();
}
function subBudget(){const v=parseFloat(document.getElementById('mbudget').value);if(v>0){S.budget=v;save();closeM();render();}}
function subCard(){
  const n=document.getElementById('mcn').value;if(!n)return;
  S.cards.push({id:uid(),name:n,last4:document.getElementById('mcl4').value||'????',billingCycle:document.getElementById('mcb').value||'?',statementDate:document.getElementById('mcs').value||'?',dueDate:document.getElementById('mcd').value||'?'});
  save();closeM();render();
}
function subPetty(){
  const amt=parseFloat(document.getElementById('mpa').value);if(!amt||amt<=0)return;
  const desc=document.getElementById('mpd').value,ts=Date.now();
  S.petty.items.push({id:uid(),date:ts,amount:amt,desc});
  S.expenses.push({id:uid(),date:ts,amount:amt,desc,method:'公司'});
  save();closeM();render();
}
function subPettyB(){const v=parseFloat(document.getElementById('mpb').value);if(v>0){S.petty.budget=v;save();closeM();render();}}
function subFund(type){
  const amt=parseFloat(document.getElementById('mfa').value);if(!amt||amt<=0)return;
  const desc=document.getElementById('mfd').value;
  if(type==='in')S.fund.balance+=amt;else S.fund.balance=Math.max(0,S.fund.balance-amt);
  S.fund.txs.push({id:uid(),date:Date.now(),amount:amt,desc,type});
  save();closeM();render();
}
function delExp(id){S.expenses=S.expenses.filter(e=>e.id!==id);save();render();}
function delCard(id){S.cards=S.cards.filter(c=>c.id!==id);save();render();}
function delPetty(id){
  const item=S.petty.items.find(e=>e.id===id);
  if(item){S.petty.items=S.petty.items.filter(e=>e.id!==id);S.expenses=S.expenses.filter(e=>!(e.method==='公司'&&Math.abs(e.date-item.date)<2000&&e.amount===item.amount));}
  save();render();
}
function delFundTx(id,type,amount){
  S.fund.txs=S.fund.txs.filter(t=>t.id!==id);
  if(type==='in')S.fund.balance=Math.max(0,S.fund.balance-amount);else S.fund.balance+=amount;
  save();render();
}
load();
</script>

</body>
</html>
